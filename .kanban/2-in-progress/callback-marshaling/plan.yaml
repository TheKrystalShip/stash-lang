# plan.yaml — small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose in
# brief.md; keep only script inputs here.
# Validate with: stash scripts/checkpoint/checkpoint.stash validate-spec <feature>

schema_version: 1

feature: callback-marshaling
title: Callback Marshaling Event-Loop

# Tagged so milestone-status.stash includes this feature in the embedding ledger.
milestone: embedding

brief: ./brief.md

created: 2026-06-04
architect_session: 2026-06-04-callback-marshaling

# Cheap per-phase smoke. Heavier suites live in per-phase verify and final_verify.
default_verify:
  - dotnet build

# Broad scope — see brief.md "Implementation Path" for the exact files per phase.
# Per-phase `files:` lists are authoritative for verify-phase-scope enforcement.
scope:
  - Stash.Core/**
  - Stash.Bytecode/**
  - Stash.Stdlib/**
  - Stash.Tests/**
  - docs/**
  - examples/**

phases:
  # ──────────────────────────────────────────────────────────────────────────
  # P1 — core marshaling slice (coupled vertical: queue + drain + producer
  # flip + time.sleep drain-loop + test flips). Cannot be split: the producer
  # flip breaks every existing watch/signal callback unless a drain point ships
  # in the same phase, and existing tests poll via time.sleep-loops. See brief
  # Decision Log entry 2026-06-04.
  # ──────────────────────────────────────────────────────────────────────────
  - id: P1
    title: Per-VM callback queue, DrainCallbacks chokepoint, time.sleep drain-loop, producer flip
    deps: []
    files:
      - Stash.Core/Runtime/WaitMode.cs
      - Stash.Core/Runtime/IInterpreterContext.cs
      - Stash.Bytecode/Runtime/VMContext.cs
      - Stash.Stdlib/BuiltIns/TimeBuiltIns.cs
      - Stash.Tests/Interpreting/FsWatchBuiltInsTests.cs
      - Stash.Tests/Embedding/CallbackDeepCloneRaceStressTests.cs
      - Stash.Tests/Embedding/CallbackImportRaceStressTests.cs
      - Stash.Tests/Stdlib/SignalNamespaceTests.cs
    verify:
      - dotnet build Stash.Bytecode/Stash.Bytecode.csproj
      - dotnet build Stash.Stdlib/Stash.Stdlib.csproj
      - dotnet test --filter "FullyQualifiedName~FsWatchBuiltInsTests|FullyQualifiedName~SignalNamespaceTests|FullyQualifiedName~SignalImplTests|FullyQualifiedName~CallbackDeepCloneRaceStressTests|FullyQualifiedName~CallbackImportRaceStressTests|FullyQualifiedName~MultiEngineIsolationTests|FullyQualifiedName~AsyncIsolationTests"
    done_when:
      - A signal.on handler that sets a parent `let stop = false` flips it to true for the parent loop after the next time.sleep returns (graceful-shutdown pattern works end-to-end via SignalImpl.Dispatch from a background thread).
      - A fs.watch callback that sets a parent `let changed = false` flips it to true after the parent's next time.sleep returns when the watched file is touched.
      - time.sleep(0.1) that drains a callback taking ~200ms returns at >= ~300ms total (wait-loop recomputes `remaining` correctly across drains; documented skew).
      - A queued callback that calls time.sleep does NOT re-pump (the inner sleep is a plain sleep because _isDraining is set); a second queued callback fires only after the first returns and the outer drain pops it.
      - A throwing queued callback is log-and-swallowed; a subsequent queued callback still fires (matches existing Dispatch behavior).
      - MultiEngineIsolationTests stays green — watcher registered on engine A does not deliver to engine B (per-VM queue preserves hermetic-vm engine↔engine isolation).
      - AsyncIsolationTests stays green — SpawnAsyncFunction's BuildChildGlobals/SnapshotUpvalues path is untouched; the queued path drops them only for the callback branch.
      - The two `Watch_*_MutationIsCallLocal` tests in FsWatchBuiltInsTests.cs are updated to assert shared-via-queued-delivery (parent's x flips to 99; parent's dict.value reads 42), no longer call-local.
      - InvokeCallbackDirect's background branch no longer references BuildChildGlobals or SnapshotUpvalues (the entire child-VM construction is gone on the queued path); same-thread Branch-1 path is unchanged.
    notes: |
      Architect's note for the implementer: when reading the two callback stress tests
      (CallbackDeepCloneRaceStressTests, CallbackImportRaceStressTests), the
      DeepClone_*/SnapshotImportStack_* non-callback cases still exercise the async path
      and stay as-is. For each `SignalCallback_*` case (which used
      vm.TestForceBackgroundBranch() to force the background branch into BuildChildGlobals
      under concurrent producer pressure): the post-flip background branch no longer
      forks, so the original hazard is gone. Either convert the case to assert "concurrent
      Enqueue + drain does not throw / does not lose events" or remove it if no
      queue-level hazard remains — pick per-case.

      Wait-mode enum and the DrainCallbacks public surface live on VMContext (the
      IInterpreterContext implementation for the VM). Producers always go through
      Context.InvokeCallbackDirect (FsBuiltIns.WatcherState.InvokeCallback at line ~101,
      SignalImpl.Dispatch at line ~134) — no producer signatures change.

      End-of-script lifetime: do NOT add an implicit "drain queued events on exit" hook.
      Reaching end-of-main exits and drops by design (acceptance criterion #5).

  # ──────────────────────────────────────────────────────────────────────────
  # P2 — event namespace. Both functions route through DrainCallbacks; both are
  # no-ops while _isDraining is set (reentrancy guard).
  # ──────────────────────────────────────────────────────────────────────────
  - id: P2
    title: event namespace (event.poll, event.loop) routing through DrainCallbacks
    deps: [P1]
    files:
      - Stash.Stdlib/BuiltIns/EventBuiltIns.cs
      - Stash.Tests/Interpreting/EventBuiltInsTests.cs
    verify:
      - dotnet build Stash.Stdlib
      - dotnet test --filter "FullyQualifiedName~EventBuiltInsTests"
    done_when:
      - event.poll() drains everything currently queued and returns immediately without blocking; a watcher fired before the poll has mutated the parent's captured state by the time poll returns.
      - event.loop() blocks and drains until cancellation; cancelling the script's CancellationToken makes the loop throw CancellationError (registered error type).
      - event.poll() called from inside a queued callback is a no-op (returns immediately, drains nothing — _isDraining is set).
      - event.loop() called from inside a queued callback is a no-op (returns immediately).
      - EventBuiltIns is authored in the [StashNamespace] partial-class source-generator shape per Stash.Stdlib/BuiltIns/CLAUDE.md (no NamespaceBuilder hand-roll); class name EventBuiltIns → Stash namespace `event`.
    notes: |
      EventBuiltIns.cs takes the IInterpreterContext parameter on both Poll and Loop and
      casts to VMContext to reach DrainCallbacks. The cast must fail loudly (TypeError or
      InvalidOperationException with a clear message) on a non-VM context — protects future
      embedders against silent no-ops if a host implements IInterpreterContext directly.

      event.loop's <exception cref="CancellationError"/> tag is required so the
      Wave2 throws-coverage meta-test (added in P4) does not need it allow-listed.

  # ──────────────────────────────────────────────────────────────────────────
  # P3 — Documentation: spec rewrite, regenerated stdlib reference, example.
  # The existing "Background-thread callback isolation" section (around §1505)
  # is now WRONG and must flip to marshaling semantics.
  # ──────────────────────────────────────────────────────────────────────────
  - id: P3
    title: Language Specification rewrite, Standard Library Reference regen, example script
    deps: [P2]
    files:
      - docs/Stash — Language Specification.md
      - docs/Stash — Standard Library Reference.md
      - examples/event_loop_shutdown.stash
    verify:
      - dotnet build Stash.Docs
      - dotnet run --project Stash.Docs/
      - dotnet test --filter "FullyQualifiedName~StandardLibraryReferenceTests"
    done_when:
      - The "Background-thread callback isolation" section in `docs/Stash — Language Specification.md` (currently around §1505) is rewritten to describe marshaling, the queue, drain points (time.sleep + event.poll + event.loop), reentrancy (run-to-completion), explicit-park lifetime, and the documented sleep-skew + already-queued-after-unwatch races. The pre-feature "callbacks run in an isolated child VM, mutations are call-local" wording is gone.
      - A new `event` section in the spec documents event.poll and event.loop with semantics + an example.
      - "`docs/Stash — Standard Library Reference.md` is regenerated by `dotnet run --project Stash.Docs/` and includes the `event` namespace; StandardLibraryReferenceTests stays green."
      - "`examples/event_loop_shutdown.stash` (or similarly-named) is authored by stash-author per its docs-first protocol: a signal.on-driven graceful-shutdown loop OR a fs.watch config-reload loop, demonstrating the closure-mutation pattern the feature restores. Includes io.println output for visual verification."
    notes: |
      Stash-author writes the example, NOT the architect or the implementer. The implementer's
      job here is the spec markdown and running `dotnet run --project Stash.Docs/` to
      regenerate the reference. The example phase delegates to stash-author with the
      docs-first protocol (read the Language Spec + Standard Library Reference + existing
      examples before writing). This is the orchestrator→stash-author shape from
      CLAUDE.md ("Avoid 3-deep agent nesting on .stash phases — skip the implementer").

      Tooling impact in this phase is minimal — only the spec/reference markdown moves;
      the LSP/DAP/Playground/VSCode tooling matrix is verified in P4 because that's where
      the surface change actually matters (event namespace completions).

  # ──────────────────────────────────────────────────────────────────────────
  # P4 — Tooling matrix verification + enforcement meta-tests. The new `event`
  # namespace changes the completion surface; throws-coverage adds a guard for
  # the new functions.
  # ──────────────────────────────────────────────────────────────────────────
  - id: P4
    title: Tooling-compatibility matrix verification + throws-coverage + completion-surface regen
    deps: [P3]
    files:
      - Stash.Playground/wwwroot/js/stash-language.js
      - .vscode/extensions/stash-lang/syntaxes/stash.tmLanguage.json
      - Stash.Tests/Lsp/Snapshots/default-with-snippets.completion.txt
      - Stash.Tests/Lsp/Snapshots/empty-file.completion.txt
      - Stash.Tests/Stdlib/SourceGenerator/Wave2ThrowsCoverageTests.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~CompletionSurfaceSnapshotTests|FullyQualifiedName~Wave2ThrowsCoverageTests|FullyQualifiedName~LspNamespaceCompletionTests|FullyQualifiedName~SemanticTokensTests"
    done_when:
      - Wave2ThrowsCoverageTests.NoThrowAllowList includes `event` with `poll` allow-listed (infallible) and `loop` carrying the `<exception cref="CancellationError"/>` tag from P2 — Wave2_EveryFunctionHasThrowsOrIsAllowlisted passes for `event`.
      - CompletionSurfaceSnapshotTests is re-baselined via STASH_SNAPSHOT_REGEN=1 and the new fixtures committed; the diff shows `event` appearing in the completion surface at the canonical cursor positions.
      - The 5-component tooling matrix in `.claude/language-changes.md` is verified explicitly: LSP (semantic tokens / completion / hover) recognizes `event` (no new behavior for `time.sleep` / `fs.watch` / `signal.on` because their signatures did not change); DAP unchanged (no new opcode, no new variable shape); Playground Monaco tokenizer either auto-includes `event` from the stdlib registry or has `event` added to its keyword/namespace list; VS Code TextMate grammar treats `event` as a namespace identifier (no special case needed if the grammar is namespace-generic); Static analysis (Stash.Analysis) resolves `event.poll`/`event.loop` as known namespace functions (no new diagnostic rule needed).
      - The verification of the matrix is recorded in the phase commit message (one line per component, including any "no change required" findings).
    notes: |
      Per .claude/language-changes.md §2 ("Tooling Compatibility — MANDATORY — verify each"),
      every component must be EXPLICITLY verified, not assumed. Most components will be
      "no change required" because event is a vanilla namespace function (no new syntax,
      no new opcodes, no new types). Record the verification result for each — silence is
      not allowed.

      If the Playground Monarch tokenizer hard-codes namespace names (rather than reading
      from the stdlib registry), `event` must be added. Check stash-language.js for the
      list pattern; either is acceptable, but the verification must NAME which.

      Also confirm `signal` and `scheduler` not being in any wave list is unchanged by
      this feature — that gap is pre-existing and tracked separately, NOT in this
      feature's scope.

# Final acceptance command — run by `/done` before promoting to 4-done/.
final_verify:
  - dotnet build
  - dotnet test
  - stash scripts/checkpoint/checkpoint.stash lint
  - stash scripts/checkpoint/checkpoint.stash lint --self-test
