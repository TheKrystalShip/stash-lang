    done_when:
      - "**`ChunkBuilder.StashValueComparer` deleted:** `Stash.Bytecode/Bytecode/ChunkBuilder.cs` lines 1220–1247 (the entire `private sealed class StashValueComparer : IEqualityComparer<StashValue>` block) is removed. Line 17 (`private readonly Dictionary<StashValue, ushort> _constantMap = new(StashValueComparer.Instance);`) is rewritten to `private readonly Dictionary<StashValue, ushort> _constantMap = new();` — the default `IEquatable<StashValue>` from `StashValue` is now the comparer."
      - "**`StashValue.cs:152` comment updated:** `// bit-level: NaN equals itself for collection ops` is rewritten to `// bit-level: structural identity for the constant-pool key — see Stash.Core.Runtime.StashEquality for runtime equality`. (The `Float` branch's `_data == other._data` rule itself is unchanged — its semantics are still bit-level, only the comment naming its purpose changes.)"
      - "**`EqualityChokepointMetaTests.KnownExemptions` is at the minimal sanctioned-uses-only state:** the only entries remaining are (a) `StashValue` itself (its own `IEquatable<StashValue>` implementation — the constant-pool key, **NOT** a runtime equality mode), (b) `ChunkBuilder._constantMap` (the sole consumer of the interning key), and (c) the `StashEquality` module's own internal delegations to `StashValue.Equals` and `object.Equals` in its non-numeric branch. The meta-test passes with this list. The list is append-only post-unit-close."
      - "**Interning regression test landed:** `Stash.Tests/Conformance/Equality/InterningRegressionTests.cs` exists, with class-level XML doc citing the at-least-as-fine constraint. Asserts: (a) a script using `let x = 1; let y = 1.0;` produces two distinct constant-pool entries (verifiable via `--disassemble`); (b) `let x = 0.0; let y = -0.0;` produces two distinct entries (bit-level distinct); (c) a script using two `NaN` literals — if reachable — produces one entry (bit-level same); (d) `let x = 1; let y = conv.toByte(1);` produces two distinct entries (different tags); (e) re-running the same script with `--no-optimize` does not collapse the int and float constants."
      - "**Vocabulary closure conformance test landed:** `Stash.Tests/Conformance/Equality/EqualityModesVocabularyConformanceTests.cs` exists, `[Trait(\"Category\",\"Conformance\")]`-marked. Uses reflection to enumerate the public surface of `Stash.Core.Runtime.StashEquality` (members of `Type.GetMembers(BindingFlags.Public | BindingFlags.Static) | BindingFlags.Public | BindingFlags.Instance`) and asserts the set of normatively-named modes equals exactly `{\"OperatorEquals\", \"SameValueZero\", \"StrictEquals\"}` (plus the private `NumericCoercingEquals` core, which is allowed via a `BindingFlags.NonPublic` filter exception)."
