      - "`dotnet test --filter \"Category=Conformance\"` is green."
    notes: |
      P5 closes the chokepoint by retiring path #4. The bit-level comparer
      semantics replace the value-`==` comparer semantics for the constant
      pool — a **safe correction**: bit-level is strictly finer (±0
      distinct, where value-`==` was merging them). A `0.0` and a `-0.0`
      literal that previously deduplicated into one constant now stay
      distinct. This is the intended structural-identity behavior; verify
      no .stashc fixture broke.

      The vocabulary closure conformance test is the enforcement mechanism
      for Edit E3's "Three named modes — one source of truth" clause. A
      future addition of a fourth mode to `StashEquality` trips the test
      RED and forces a spec edit + a Decision Log entry (matching the
      §Values & Types Edit 1 closing sentence's "future runtime category
      is a breaking change" pattern).

      Do NOT change the `Float` branch's `_data == other._data` semantics
      in `StashValue.Equals` — its semantics are correct for the
      structural-identity role. Only update the comment.

