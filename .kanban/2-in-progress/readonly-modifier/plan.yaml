# plan.yaml — small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose in
# brief.md; keep only script inputs here.
# Validate with: stash scripts/checkpoint/validate-spec.stash readonly-modifier

schema_version: 1

feature: readonly-modifier
title: readonly modifier — deep value immutability
brief: ./brief.md

# Phase 1 of the `embedding` milestone (readonly → hermetic VM → host SDK).
# See .kanban/milestones/embedding/MILESTONE.md.
milestone: embedding

created: 2026-05-30
architect_session: 2026-05-30-readonly-modifier-spec

# Cheap default verify — every phase. Heavier feature-wide checks live in per-phase verify
# and especially in final_verify.
default_verify:
  - dotnet build

# Broad scope safety rail. Implementers may make small documented corrections (renamed
# file, moved helper, wrong verify filter) inside the current phase's intent.
scope:
  - Stash.Core/**
  - Stash.Bytecode/**
  - Stash.Analysis/**
  - Stash.Stdlib/**
  - Stash.Lsp/**
  - Stash.Playground/**
  - Stash.Docs/**
  - Stash.Tests/**
  - .vscode/extensions/stash-lang/**
  - docs/**
  - examples/**
  - tree-sitter-stash/**

phases:
  # ---------------------------------------------------------------------------
  - id: P1
    title: Lexer + parser surface for `readonly` modifier
    deps: []
    files:
      - Stash.Core/Lexing/Keywords.cs
      - Stash.Core/Lexing/TokenType.cs
      - Stash.Core/Parsing/Parser.cs
      - Stash.Core/Parsing/AST/VarDeclStmt.cs
      - Stash.Core/Parsing/AST/ConstDeclStmt.cs
      - Stash.Tests/Lexing/**
      - Stash.Tests/Parsing/**
    verify:
      - dotnet build Stash.Core
      - dotnet test --filter "FullyQualifiedName~LexerTests|FullyQualifiedName~ParserTests"
    done_when:
      - "`readonly` is registered in `Keywords.SoftKeywords` (soft/contextual, like `async`/`export`); the lexer emits it as `Identifier` and it remains usable as a plain identifier elsewhere."
      - "`readonly let x = 1;` and `readonly const y = 2;` parse into `VarDeclStmt`/`ConstDeclStmt` nodes carrying an `IsReadonly = true` flag, via a 3-way branch on `Identifier(\"readonly\")` in `Declaration()` (→ `let`/`const` = modifier; → `fn`/`struct`/`enum`/`interface` = targeted diagnostic; → else = plain identifier)."
      - "`readonly` before a non-`let`/`const` declaration produces a clear `readonly only modifies let/const` diagnostic; `readonly` in a `for`-init clause is rejected with a clear message."
      - "`export readonly const X = …;` parses (the `export` site wires the readonly hook; single canonical order `export readonly const`)."
      - "`let readonly = 1;` still parses (soft keyword does not break identifier use)."
      - "The `Keywords.SoftKeywords` drift/snapshot guard (analogue of the `HardKeywords == Lexer.KeywordNames` assertion in `LexerTests.cs`) is updated to include `readonly`."
    notes: |
      Keyword kind RESOLVED (2026-06-01): SOFT/contextual, consistent with the
      existing soft declaration modifiers `async`/`export`. `readonly` is NOT
      used as an identifier anywhere in the corpus (verified), so a hard keyword
      would also be safe today — but soft matches the sibling precedent and never
      breaks external code. Unambiguous because `readonly` is always followed by
      the hard keywords `let`/`const`.

      Construction sites (verified in Parser.cs): the hook lives in
      `Declaration()`, which is re-entered by `ParseBlock()` — so top-level,
      every block, and every function body are covered by one hook. Two sites
      bypass it and need explicit handling: `ForStatement` (for-init → reject)
      and `ExportDeclaration` (→ allow `export readonly const`).

      The carrier AST nodes already exist (`VarDeclStmt`, `ConstDeclStmt`); this
      phase only adds an `IsReadonly` flag and the parser-side modifier slot.

  # ---------------------------------------------------------------------------
  - id: P2
    title: All six AST visitors + formatter round-trip the new flag
    deps: [P1]
    files:
      - Stash.Core/Resolution/SemanticResolver.cs
      - Stash.Analysis/Visitors/SemanticValidator.cs
      - Stash.Analysis/Visitors/SymbolCollector.cs
      - Stash.Analysis/Visitors/SemanticTokenWalker.cs
      - Stash.Analysis/Visitors/StashFormatter.cs
      - Stash.Analysis/Formatting/Printers/DeclarationPrinter.cs
      - Stash.Analysis/Models/SymbolInfo.cs
      - Stash.Bytecode/Compilation/Compiler.Declarations.cs
      - Stash.Tests/Analysis/**
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~FormatterTests|FullyQualifiedName~SymbolCollectorTests|FullyQualifiedName~SemanticTokenTests"
    done_when:
      - "All six visitors (Compiler, SemanticResolver, SemanticValidator, SymbolCollector, SemanticTokenWalker, StashFormatter) compile and execute against the new `IsReadonly` flag without `NotImplementedException` or warnings."
      - "`StashFormatter` round-trips `readonly let X = …;` and `readonly const X = …;` declarations byte-for-byte (after canonical whitespace)."
      - "`SymbolCollector` records readonly-ness on the binding's symbol entry so later phases (P6 analyzer) can query it."
      - "`SemanticTokenWalker` emits a `keyword`-class semantic token for the `readonly` lexeme."

  # ---------------------------------------------------------------------------
  - id: P3
    title: Uniform runtime deep-freeze primitive across all reference types
    deps: [P2]
    files:
      - Stash.Core/Runtime/Types/StashDictionary.cs
      - Stash.Core/Runtime/Types/StashFrozenArray.cs
      - Stash.Core/Runtime/Types/StashInstance.cs
      - Stash.Core/Runtime/Types/StashError.cs
      - Stash.Core/Runtime/RuntimeValues.cs
      - Stash.Core/Runtime/StashValue.cs
      - Stash.Bytecode/VM/VirtualMachine.*.cs
      - Stash.Tests/Runtime/**
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~RuntimeValuesTests|FullyQualifiedName~StashDictionaryTests|FullyQualifiedName~FreezeTests"
      # Perf gate (Q1 always-wrap carrier touches the array hot path). Record
      # median-of-3 before/after; no regression beyond noise on these two.
      - dotnet run --project Stash.Cli/ -c Release -- benchmarks/bench_algorithms.stash
      - dotnet run --project Stash.Cli/ -c Release -- benchmarks/bench_numeric.stash
    done_when:
      - "Plain arrays use an **always-present wrapper carrier** (decided 2026-06-01 — `is` is reference identity, so wrap-on-freeze is ruled out) exposing an in-place `IsFrozen` bit; dict and struct/`StashInstance` likewise expose `IsFrozen` + `Freeze()`."
      - "`StashError` is NOT given a new write-guard (it already rejects field writes — no `IVMFieldMutable`); `DeepFreeze` only traverses into its properties dict to freeze nested values."
      - "A cycle-safe `DeepFreeze(StashValue)` helper exists in a single source-of-truth location and is the only caller path that flips the flag on nested values; **function/closure values are treated as opaque** (skipped, not frozen)."
      - "Every write path on dict / array carrier / struct (field set, index set, in-place mutators like `push`/`pop`/`set`/`del`/`clear`) throws `ReadOnlyError` when the carrier is frozen — verified by direct C# unit tests, not via Stash-source-level tests."
      - "`ReadOnlyError`'s message is generalized per value kind (the current text is namespace-member-specific and would be wrong on a user dict/array)."
      - "An in-process attempt to mutate a deeply-nested frozen value through a fresh alias throws `ReadOnlyError` at runtime (the flag is on the value, not the binding)."
      - "Primitives passed to `DeepFreeze` are accepted as no-ops (no exception, no flag change)."
      - "The existing `StashFrozenArray` wrapper is deleted or reduced to a thin shim over the in-place flag; `cli.argv`-style boundary callers now flag the underlying value in place and value identity is preserved (a frozen array `is` the same reference it was before — observable via aliasing, e.g. `readonly let a = arr; a is arr`)."
      - "No perf regression beyond run-to-run noise on `bench_algorithms` / `bench_numeric` vs the pre-P3 baseline (record both in the phase commit)."
    notes: |
      Q1 RESOLVED (2026-06-01): always-present wrapper carrier for plain arrays
      (NOT wrap-on-freeze) — `is`/`==` is C# reference identity, so swapping the
      carrier would break identity (`readonly let a = arr; a is arr`). Q3
      corrected: `StashError` is
      already write-blocked; no new guard, traverse-into only. See brief.md
      Decision Log (2026-06-01 entries).

  # ---------------------------------------------------------------------------
  - id: P4
    title: Compiler wires the `readonly` flag to runtime deep-freeze on init + rebind
    deps: [P3]
    files:
      - Stash.Bytecode/Compilation/Compiler.Declarations.cs
      - Stash.Bytecode/Compilation/Compiler.Assignments.cs
      - Stash.Bytecode/Compilation/Compiler.Helpers.cs
      - Stash.Bytecode/Compilation/CompilerScope.cs
      - Stash.Bytecode/Runtime/UpvalueDescriptor.cs
      - Stash.Bytecode/VM/VirtualMachine.*.cs
      - Stash.Tests/Bytecode/**
      - Stash.Tests/VM/**
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~CompilerTests|FullyQualifiedName~VMTests|FullyQualifiedName~ReadonlyTests"
      # Perf gate — the init/rebind freeze emission sits on the declaration/assign hot path.
      - dotnet run --project Stash.Cli/ -c Release -- benchmarks/bench_algorithms.stash
      - dotnet run --project Stash.Cli/ -c Release -- benchmarks/bench_function_calls.stash
    done_when:
      - "`readonly const D = { ports: [80] };` followed by `D.ports.push(22);` raises `ReadOnlyError` when executed by the CLI (end-to-end through parse → compile → VM)."
      - "`readonly const D = {...}; let a = D; a.x = 2;` raises `ReadOnlyError` (aliasing through `let` is caught by the value-side flag)."
      - "`readonly let S = makeSnapshot(); S = makeSnapshot(); S.x = 1;` raises `ReadOnlyError` (rebind re-freezes)."
      - "`readonly let n = 42; n = 99;` executes without error (primitive no-op; binding remains rebindable)."
      - "A `readonly const` binding still cannot be reassigned (existing `const` binding-axis behavior is preserved unchanged)."
      - "Q4: rebind through a closure upvalue re-freezes too — `readonly let S = {...}; fn g() { S = makeMutable(); } g(); S.x = 1;` raises `ReadOnlyError`. Requires the readonly bit threaded into `UpvalueDescriptor` and the upvalue store path guarded."
      - "Regression guard for the incidental const fix: an outer `const` reassigned inside a closure (`const c = 1; fn g() { c = 2; } g();`) now raises (previously silently succeeded — see backlog bug)."
      - "No perf regression beyond run-to-run noise on `bench_algorithms` / `bench_function_calls` vs the pre-P4 baseline."

  # ---------------------------------------------------------------------------
  - id: P5
    title: Analyzer best-effort static diagnostics for `readonly` mutations
    deps: [P2, P3]
    files:
      - Stash.Analysis/Visitors/SemanticValidator.cs
      - Stash.Analysis/Rules/**
      - Stash.Tests/Analysis/**
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~SemanticValidatorTests|FullyQualifiedName~AnalyzerTests"
    done_when:
      - "A statically-visible direct mutation of a `readonly` binding — `D.x = …` or `D[i] = …` where `D` is declared `readonly let` / `readonly const` in the visible scope — produces a diagnostic at analysis time (before runtime)."
      - "Known in-place stdlib mutators called on a known-`readonly` argument (e.g. `arr.push(D, …)`) produce a diagnostic."
      - "Aliasing through `let a = D; a.x = …` does **not** produce a false-positive diagnostic on `a` (the analyzer's job is best-effort direct-mutation detection; aliasing is left to runtime)."
      - "Mutation of a non-`readonly` binding produces no diagnostic (no regression of existing behavior)."

  # ---------------------------------------------------------------------------
  - id: P6
    title: LSP / playground / TextMate / tree-sitter / spec / examples — full toolchain surface
    deps: [P2, P4]
    files:
      - Stash.Lsp/Handlers/SemanticTokensHandler.cs
      - Stash.Lsp/Handlers/CompletionHandler.cs
      - Stash.Lsp/Handlers/HoverHandler.cs
      - Stash.Playground/wwwroot/js/stash-language.js
      - .vscode/extensions/stash-lang/syntaxes/stash.tmLanguage.json
      - tree-sitter-stash/grammar.js
      - docs/Stash — Language Specification.md
      - examples/readonly.stash
      - Stash.Tests/Lsp/**
      - Stash.Tests/**CompletionSurfaceSnapshotTests**
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~SemanticTokenTests|FullyQualifiedName~CompletionHandlerTests|FullyQualifiedName~HoverHandlerTests|FullyQualifiedName~CompletionSurfaceSnapshotTests|FullyQualifiedName~StandardLibraryReferenceTests"
      - dotnet run --project Stash.Cli/ -- examples/readonly.stash
    done_when:
      - "LSP completion at statement-start in a `.stash` file offers `readonly` as a keyword completion (auto-flows from `Keywords.SoftKeywords` via `Keywords.All` → `KeywordCompletionProvider`)."
      - "LSP semantic tokens classify `readonly` as the modifier/`keyword` class — AST-driven, so it tags only true modifiers and never a variable named `readonly`."
      - "LSP hover on `readonly` shows a description that includes the deep/transitive semantics."
      - "The playground Monarch tokenizer highlights `readonly` consistently with `let`/`const`."
      - "The VS Code TextMate grammar matches `readonly` contextually (before `let`/`const`) and assigns it a `storage.modifier.stash` scope (new scope — none existed before)."
      - "`tree-sitter-stash/grammar.js` gains an `optional('readonly')` prefix in the `variable_declaration` and `constant_declaration` rules; the grammar regenerates cleanly."
      - "`docs/Stash — Language Specification.md` contains a `readonly` section reachable from the ToC, documenting the modifier, the deep/transitive semantics, the soft-keyword treatment, the **deep-vs-shallow rationale** (value-immutability-for-sharing camp vs binding-annotation camp; why shallow is insufficient here), the retroactive-in-place novelty, and the headline aliasing-footgun example."
      - "`examples/readonly.stash` runs under the CLI end-to-end, exercises deep-freeze, aliasing-throws, rebind-refreezes, primitive no-op, the aliasing footgun (collateral freeze of a pre-existing nested value), and a `ReadOnlyError` catch, and is referenced from the examples README/index if one exists."
      - "DAP verified — no change required (a declaration modifier never appears in an evaluable watch/REPL expression)."
      - "`CompletionSurfaceSnapshotTests` either passes against the existing baseline, or is re-baselined in this phase with `STASH_SNAPSHOT_REGEN=1` and the regenerated snapshot is committed."

# Final acceptance — run by `/done` before promoting to 4-done/.
# Filter shape borrowed from .kanban/4-done/stdlib-namespace-members/plan.yaml:
# excludes documented flaky / environment-dependent classes (per .claude/repo.md
# "Known Issues") but DELIBERATELY INCLUDES StandardLibraryReferenceTests,
# CompletionSurfaceSnapshotTests, and Wave1ThrowsCoverageTests — those guard the
# .claude/language-changes.md checklist for new language/stdlib features and a
# narrower filter would mask omissions.
final_verify:
  - dotnet build
  - dotnet test --filter "FullyQualifiedName!~DiffPackageTests&FullyQualifiedName!~FirstRegistrationAdminTests&FullyQualifiedName!~AuthEndpointTests&FullyQualifiedName!~BasePathIntegrationTests&FullyQualifiedName!~FuzzHarnessTests&FullyQualifiedName!~IntegrityVerification&FullyQualifiedName!~FsWatchBuiltIns&FullyQualifiedName!~NetBuiltInsTests&FullyQualifiedName!~FormatRunner_ExcludeGlob&FullyQualifiedName!~AsyncFn_ParallelExecution&FullyQualifiedName!~TcpSend_ReturnsByteCount&FullyQualifiedName!~NamespaceExpansion_CliNamespace_ShowsMembersWithMemberType"
  - dotnet run --project Stash.Docs/
  - dotnet run --project Stash.Cli/ -- examples/readonly.stash
  - stash scripts/checkpoint/validate-spec.stash readonly-modifier
