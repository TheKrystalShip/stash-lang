  - .kanban/milestones/language-standard/coverage.md

phases:
  - id: P1
    title: "Chokepoint + guards: Error root, system-fault split, Detect meta-tests, AssertionError registered"
    deps: []
    files:
      - Stash.Core/Runtime/Errors/StashErrorAttribute.cs
      - Stash.Core/Runtime/Errors/Error.cs
      - Stash.Core/Runtime/ErrorTypeRegistry.cs
      - Stash.Core/Runtime/AssertionError.cs
      - Stash.Bytecode/VM/VirtualMachine.ControlFlow.cs
      - Stash.Stdlib.Generators/StashErrorRegistryGenerator.cs
      - Stash.Tests/Conformance/Errors/_README.md
      - Stash.Tests/Conformance/Errors/BareBaseErrorChokepointMetaTests.cs
      - Stash.Tests/Conformance/Errors/ErrorTypeContractConformanceTests.cs
      - Stash.Tests/Conformance/Errors/SystemFaultCatchModelConformanceTests.cs
      - Stash.Tests/Conformance/Errors/ThrowWrappingConformanceTests.cs
      - Stash.Tests/Conformance/ConformanceTraitMetaTests.cs
      - Stash.Tests/Conformance/_README.md
    verify:
      - dotnet build Stash.sln
      - dotnet test --filter "FullyQualifiedName~BareBaseErrorChokepointMetaTests|FullyQualifiedName~ErrorTypeContractConformanceTests|FullyQualifiedName~SystemFaultCatchModelConformanceTests|FullyQualifiedName~ThrowWrappingConformanceTests|FullyQualifiedName~ConformanceTraitMetaTests"
      - dotnet test --filter "Category=Conformance"
      - dotnet test
    done_when:
      - "Stash.Core/Runtime/Errors/Error.cs exists - a concrete C# class `public class Error : RuntimeError`, attributed `[StashError(Description = \"Base catchable runtime error.\")]`, with one public constructor `Error(string message, SourceSpan? span = null)`."
      - "StashErrorAttribute.cs gains a `public string? Parent { get; init; }` property documenting that omitting `Parent` defaults the parent to `Error` (the registered root); System Faults (`CancellationError`) carry an explicit `Parent = null` to opt out of the `Error` subtree. The source generator (StashErrorRegistryGenerator) is extended to emit a `BuiltInErrorRegistry.ParentOf` lookup and to fail compilation if any registered type's parent chain (a) cycles, (b) names a non-existent type, or (c) has more than one root (the closed set is `{ \"Error\", null }` where null marks a System Fault)."
      - "Stash.Core/Runtime/AssertionError.cs gains `[StashError(Description = \"An assert.* built-in's predicate failed.\", Properties = new[] {\"expected\", \"actual\"}, PropertyTypes = new[] {\"any\", \"any\"})]`. The Expected/Actual C# fields are surfaced via a new `GetProperties()` override returning `{\"expected\": Expected, \"actual\": Actual}`."
      - "Stash.Core/Runtime/Errors/CancellationError.cs carries `[StashError(Description = \"...\", Parent = null)]` (explicit `Parent = null` opts out of the `Error` subtree; the existing `Description` is preserved)."
      - "Stash.Core/Runtime/ErrorTypeRegistry.cs:Matches gains a bounded subtype walk: matches if `targetType == errorType` OR `targetType` is reached by walking the parent chain from `errorType` (built from `BuiltInErrorRegistry.ParentOf`). The walk terminates at a null parent (System Fault root) or at `Error` (catchable root). `Matches(_, \"Error\")` matches every type under the `Error` subtree but NOT a System Fault."
      - "Stash.Bytecode/VM/VirtualMachine.ControlFlow.cs:31 (the `throw \"string\"` path) constructs `new Error(msg, span)` instead of `new RuntimeError(msg, span)`. :70 (the non-error fallback) constructs `new Error(...)`. :39 (the dict-throw-no-type-field default) constructs the user error with `Error` not `RuntimeError`. :755 (bare `throw;` outside catch) constructs `new Error(...)`."
      - "ExecuteCatchMatch (VirtualMachine.ControlFlow.cs:695-735) gates the empty-typeNames catch-all on the `Error` subtree: if the thrown error's registered type is a System Fault (i.e. its parent chain does NOT reach `Error`), the empty-typeNames clause does NOT match. Explicit named catch clauses (e.g. `catch (CancellationError e)`) still match via the existing CLR-identity fast-path / name-based fallback."
      - "Stash.Tests/Conformance/Errors/BareBaseErrorChokepointMetaTests.cs exists - Roslyn sink-scan meta-test flagging any `throw new RuntimeError(` outside an explicit KnownExemptions list. The list is structured BY BUCKET: each not-yet-migrated bucket (Bytecode-typeops, Bytecode-collections, Bytecode-arithmetic, Bytecode-variables, Bytecode-modules, Core-types, Stdlib-args, Stdlib-misc, Cli, Hosting) is its own entry, removed by the bucket-phase that retypes it. Meta-test goes up GREEN with the full list. Pattern copies EqualityChokepointMetaTests exactly: MetadataReferences from TRUSTED_PLATFORM_ASSEMBLIES + assemblies-under-test (CLAUDE.md Roslyn-determinism rule); MinScannedFiles floor; binding-floor asserting `Stash.Runtime.Errors.Error` resolves to a non-error INamedTypeSymbol; fail-path teeth self-test feeding a fixture with a banned `throw new RuntimeError(` to the scan logic and asserting it is flagged."
      - "Stash.Tests/Conformance/Errors/ErrorTypeContractConformanceTests.cs exists, `[Trait(\"Category\",\"Conformance\")]`-marked - reflection scan over every `class X : RuntimeError` in Stash.Core.Runtime.Errors and adjacent registered-type homes. Asserts each non-abstract subclass (a) carries `[StashError]`, (b) its name ends in `Error` (including `[StashError(Name=...)]` overrides), (c) appears in BuiltInErrorRegistry. Goes up green at P1; catches the AssertionError registration the same phase fixes."
      - "Stash.Tests/Conformance/Errors/SystemFaultCatchModelConformanceTests.cs exists, `[Trait(\"Category\",\"Conformance\")]`-marked - asserts (a) `catch (Error e)` traps a `throw \"boom\"` whose `.type == \"Error\"`; (b) `catch (e)` (untyped) traps the same; (c) `catch (Error e)` does NOT trap a CancellationError (use `task.cancel` to produce one); (d) `catch (e)` (untyped) does NOT trap a CancellationError; (e) explicit `catch (CancellationError e)` traps the CancellationError. Plus a meta-test enumerating every registered type via reflection and asserting each has a parent chain that terminates at exactly one of `Error` or null (System Fault root)."
      - "Stash.Tests/Conformance/Errors/ThrowWrappingConformanceTests.cs exists, `[Trait(\"Category\",\"Conformance\")]`-marked - per the Errors *Throw* clause: `throw \"boom\"` -> caught `.type == \"Error\"`; `throw 42` -> caught `.type == \"Error\"`; `throw {\"key\": \"val\"};` (dict, no `type` field) -> caught `.type == \"Error\"`; `throw {type: \"MyError\", message: \"m\"};` -> caught `.type == \"MyError\"` (UserRuntimeError preserved); bare `throw;` outside catch -> caught `.type == \"Error\"` with message `Rethrow used outside of a catch block.`."
      - "Cross-unit conformance test moves landed in P1 (matching the spec-edit half - sealed Async amendment): Stash.Tests/Conformance/Async/FuturesCoreConformanceTests.cs:184 (`D7_ThrowString_WrapsToRuntimeError_PerSpecAsyncD7`) is renamed to `D7_ThrowString_WrapsToError_PerSpecAsyncD7`; the `Assert.Equal(\"RuntimeError\", error.ErrorType)` flips to `Assert.Equal(\"Error\", error.ErrorType)`. Conformance/Async/CombinatorsConformanceTests.cs:150 C#-escape mention has its RuntimeError references replaced with Error (test + XML doc). NO new conformance test asserts the old `RuntimeError` value (no two-tests-asserting-opposite-things)."
      - "Spec edit (cross-unit Async L1708/L1710) landed: docs/Stash â€” Language Specification.md L1708 says `wraps to a generic Error` (was RuntimeError); L1710 says `throw \"string\" inside a task wraps to Error(\"string\")` (was RuntimeError). Distinctive phrase for grep: `wraps to a generic` Error and `wraps to` Error(\"string\")."
      - "Existing exact-type `Assert.Throws<RuntimeError>` sites that P1 invalidates are updated in P1 (in-scope per Decision Log): any test that exercises `throw \"string\"` / dict-no-type / bare-`throw;` outside catch and asserts the exact base type must update to assert against `Error` (via `Assert.Throws<Error>` or `Assert.ThrowsAny<RuntimeError>` + `Assert.Equal(\"Error\", e.ErrorType)`). Pre-commit run of `dotnet test --filter \"FullyQualifiedName~VirtualMachineTests|FullyQualifiedName~InterpreterTests|FullyQualifiedName~DeferTests\"` (or equivalent) is green."
      - "**Cancellation-catch blast radius updates landed in P1 (the L4 parallel of the Flag-1 finding).** Today every existing `try { await <cancelled> } catch (e) { ... }` and `try { ... } catch (Error e) { ... }` traps a CancellationError; after P1 it does not (the empty-typeNames fast path is gated on the Error subtree). Every such test must update to `catch (CancellationError e)` (or split into two clauses). Confirmed call sites include `Stash.Tests/Interpreting/Async/CancellationAndTimeout/CancellationTests.cs:100`, `Stash.Tests/Conformance/Async/CancellationConformanceTests.cs:353` (the event.loop() cancellation test), and any other test that exercises task.cancel or event-loop-cancellation through an untyped catch. **Pre-commit grep:** `grep -rnB2 -A2 'catch (e)\\|catch (Error' Stash.Tests/Conformance/Async/ Stash.Tests/Interpreting/Async/CancellationAndTimeout/ Stash.Tests/Interpreting/TaskBuiltInsTests.cs Stash.Tests/Interpreting/TimeoutExprTests.cs` and update every match that exercises cancellation. Record the migration count in the commit message. **Examples scan:** `grep -rln 'task.cancel\\|CancellationError' examples/` â€” if any example relies on the old behavior, update it too (the brief documents none today, but verify)."
      - "**`TruthinessConformanceTests.cs:244` cross-unit move:** the test comment 'A caught Error (thrown string -> RuntimeError) is truthy' is updated to 'A caught Error (thrown string -> Error) is truthy'. The behavior (caught-error truthy) is preserved per sealed Â§Values D5; only the type-name reference updates."
      - "**`Error` C# name-collision pre-flight passed:** `grep -rnE 'enum Error\\b|class Error\\b' --include=\"*.cs\"` reports no existing collisions in any Stash project. Files that `using Stash.Runtime.Errors;` are inspected (Stash.Stdlib/BuiltIns/IniBuiltIns.cs, TimeBuiltIns.cs, SvArgs.cs) to confirm no unqualified `Error` token in those files would surprise-bind to the new class. Record the pre-flight output in the P1 commit message."
      - "ConformanceTraitMetaTests.MinScannedParticipants is raised by the count of new participants landed in P1 (4: BareBaseErrorChokepointMetaTests, ErrorTypeContractConformanceTests, SystemFaultCatchModelConformanceTests, ThrowWrappingConformanceTests); the trait-guard meta-test passes."
      - "Stash.Tests/Conformance/_README.md directory-layout table includes an `Errors/` row pointing at this unit. Stash.Tests/Conformance/Errors/_README.md exists and names the conformance areas this directory will populate (one per planned class)."
      - "dotnet test --filter \"Category=Conformance\" is green and binds non-zero tests across Async/, Values/, Equality/, and Errors/."
      - "Full dotnet test is green."
    notes: |
      P1 is the chokepoint-build phase. Behavior changes are SCOPED but
      NOT minimal: three semantic flips land here that a reviewer must see
      named explicitly (NOT hidden under "MINIMAL"):

      1. The four ExecuteThrow paths flip from `new RuntimeError(...)`
         to `new Error(...)`. User-visible surface: `.type` changes from
         "RuntimeError" to "Error" for any untyped throw.

      2. The empty-typeNames catch-all fast path is gated on the Error
         subtree. User-visible surface: `catch (e)` and `catch (Error e)`
         STOP trapping CancellationError. Today every existing
         `try { await <cancelled> } catch (e) { ... }` traps; after P1
         the cancellation propagates. This is the L4 user-locked behavior
         and the most subtle change â€” every existing test that catches a
         cancellation via untyped `catch (e)` must update to
         `catch (CancellationError e)`. The blast-radius pre-grep is
         mandatory.

      3. AssertionError registration. Name-preserving (already named
         AssertionError); the only new visible surface is `.expected` and
         `.actual` exposure via GetProperties().

      The Async sealed-clause amendment (L1708/L1710) lands here because
      the throw-wrap behavior is what L1708/L1710 describe; the test move
      (renaming + retype) is the cross-unit discipline.

      Negative space: ExitException, ScriptCancelledException, and
      StepLimitExceededException all derive from System.Exception (not
      RuntimeError), so they bypass the StashError catch machinery
      already; P1 establishes nothing for them â€” only documents existing
      behavior. The only registered System Fault is CancellationError;
      `SystemFaultCatchModelConformanceTests` asserts the closed set is
      exactly that one name.

