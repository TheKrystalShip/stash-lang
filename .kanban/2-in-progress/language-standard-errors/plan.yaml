  - id: P10
    title: "Cause chaining mechanics: .cause field-form + StashError accessor + ExecuteThrow validation (D22)"
    deps: [P9]
    files:
      - Stash.Core/Runtime/Types/StashError.cs
      - Stash.Core/Runtime/RuntimeError.cs
      - Stash.Bytecode/VM/VirtualMachine.ControlFlow.cs
      - Stash.Tests/Conformance/Errors/CauseChainConformanceTests.cs
      - Stash.Tests/Conformance/ConformanceTraitMetaTests.cs
    verify:
      - dotnet build Stash.sln
      - dotnet test --filter "FullyQualifiedName~CauseChainConformanceTests|FullyQualifiedName~InterpreterTests|FullyQualifiedName~VirtualMachineTests"
      - dotnet test --filter "Category=Conformance"
      - dotnet test
    done_when:
      - "Stash.Core/Runtime/RuntimeError.cs gains `public RuntimeError? Cause { get; set; }` (or equivalent field). Defaults to null."
      - "Stash.Core/Runtime/Types/StashError.cs (the first-class Stash error VALUE) gains a `.cause` accessor that returns a StashError wrapping the underlying RuntimeError.Cause, or `StashValue.Null` when Cause is null. The accessor joins .type/.message/.stack/.suppressed as a fifth always-present member surfaced via the StashError property/index handler."
      - "Stash.Bytecode/VM/VirtualMachine.ControlFlow.cs:ExecuteThrow recognizes the `cause` field in the dict-throw path (around :41-46) and the struct-throw path (around :60-65): pulls it out of the dict/struct, validates it is either an Error value or null (anything else raises `new TypeError(\"'cause' must be an Error value or null, got <typeof>\", span)` at the throw site - the new error is NOT raised; the validation throws first), and sets the resulting error's `Cause` property. Other dict/struct fields continue to flow into `Properties` as today (`cause` is excluded from Properties)."
      - "Built-in error-type constructors (TypeError, ValueError, IOError, etc.) accept an optional `cause` parameter at construction (a `RuntimeError? cause = null` second/last argument); their `[StashError(Properties = ...)]` declarations do NOT list `cause` (it's a structural member of the root, not a per-type typed property)."
      - "Runtime probe (pre-commit) confirms cause chaining: `try { try { throw IOError { message: \"inner\" }; } catch (e) { throw ValueError { message: \"outer\", cause: e }; } } catch (e) { io.println(e.message); io.println(e.cause.type); io.println(e.cause.message); io.println(e.cause.cause == null); }` prints `outer`, `IOError`, `inner`, `true`. `try { throw \"boom\"; } catch (e) { io.println(e.cause == null); }` prints `true` (default-null). `try { throw ValueError { message: \"x\", cause: 42 }; } catch (TypeError e) { io.println(\"validated\"); }` prints `validated` (non-Error cause is rejected at throw site)."
      - "Conformance: Stash.Tests/Conformance/Errors/CauseChainConformanceTests.cs exists, `[Trait(\"Category\",\"Conformance\")]`-marked, with class-level XML doc citing D22. Asserts: (a) `.cause` is null when unset; (b) `.cause` round-trips an Error value through dict-throw and struct-throw; (c) deep chains (3+ levels) walk correctly via repeated `.cause`; (d) `throw E { cause: <non-Error-non-null> }` raises TypeError at the throw site; (e) rethrow (`throw;`) preserves `.cause`; (f) no implicit chaining - a `throw` inside a `catch` that does NOT name `cause:` produces an error whose `.cause` is null (NOT auto-set to the caught error); (g) a cause-chain cycle (manually constructed: an error whose .cause points back to itself via mutation) is observable to a walker but does NOT cause a runtime infinite loop on its own (the runtime never walks the chain implicitly)."
      - "ConformanceTraitMetaTests.MinScannedParticipants is raised by 1 (covers CauseChainConformanceTests)."
      - "Full dotnet test is green. The .cause addition must not regress any existing error-payload-access test (.type/.message/.stack/.suppressed all still work). dotnet test --filter \"Category=Conformance\" is green."
    notes: |
      P10 is the mechanics-only phase for explicit error chaining (D22).
      The field form means zero grammar change - ExecuteThrow already
      copies dict/struct fields into Properties; this phase intercepts
      the `cause` field name BEFORE that copy, validates it, and routes
      it to a dedicated Cause property on RuntimeError. Other dict
      fields continue to flow into Properties unchanged.

      The `cause` field is NOT a per-type typed property (no [StashError]
      Properties list mentions it). It is a structural member of the
      root, like `.message`/`.stack`/`.suppressed` - surfaced on every
      registered error type uniformly via StashError's accessor.

      P10 lands the BEHAVIOR. P11 lands the SPEC PROSE (subsection in
      Error Values + Error Chaining + Error Type Contract). Splitting
      lets the mechanics land + tests prove correct, then P11 is a
      pure-docs phase that names the law that's already true.

      The cycle non-detection rule is deliberate: bounding the chain in
      the runtime adds cost to a feature most users will use 0-2 levels
      deep. A misbehaving walker that loops is the same defect class as
      any other naive recursion; the spec names that the runtime doesn't
      protect against it.

