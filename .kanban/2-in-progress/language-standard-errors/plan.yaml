      - dotnet test --filter "Category=Conformance"
      - dotnet test
    done_when:
      - "Stash.Core/Runtime/Errors/ArithmeticError.cs exists, `[StashError(Description = \"Catch-supertype for arithmetic faults.\")]`, concrete class deriving from RuntimeError."
      - "Stash.Core/Runtime/Errors/DivisionByZeroError.cs exists, `[StashError(Description = \"Division by zero in an integer division or literal 0.0/0.0.\", Parent = \"ArithmeticError\")]`, deriving from ArithmeticError."
      - "Stash.Bytecode/VM/VirtualMachine.Arithmetic.cs:165,172 and Stash.Bytecode/Runtime/RuntimeOps.cs:275,283 throw `new DivisionByZeroError(\"Division by zero.\", span)` instead of `new RuntimeError(...)`."
      - "BareBaseErrorChokepointMetaTests.KnownExemptions shrinks: the Bytecode-arithmetic-divbyzero bucket entry is removed."
      - "Runtime probe (pre-commit) confirms the fix: `try { let x = 1 / 0; } catch (DivisionByZeroError e) { io.println(\"by-zero\"); } catch (ArithmeticError e) { io.println(\"arith\"); } catch (Error e) { io.println(\"base\"); }` prints `by-zero`. Record probe output in the commit."
      - "Spec Edit (cross-unit Values L793) landed: `RuntimeError(\"Division by zero.\")` replaced with `DivisionByZeroError(\"Division by zero.\")` at L793. The distinctive phrase that grep can find: ``DivisionByZeroError(\"Division by zero.\")`` literally appears at L793."
      - "Conformance: Stash.Tests/Conformance/Errors/ArithmeticConformanceTests.cs exists, `[Trait(\"Category\",\"Conformance\")]`-marked. Asserts: (a) `1/0` raises DivisionByZeroError catchable by all three of DivisionByZeroError, ArithmeticError, Error; (b) `1.0/0.0` literal raises DivisionByZeroError; (c) non-literal float division by zero (`let x = 1.0; let y = 0.0; x/y`) produces Infinity or NaN per Values (no throw)."
      - "Cross-unit sealed-test moves landed: any conformance test in Stash.Tests/Conformance/Values/ that asserts the bare-base type on division-by-zero is updated in-place (rename + retype). No two-tests-asserting-opposite-things."
      - "ConformanceTraitMetaTests.MinScannedParticipants is raised by 1 (covers ArithmeticConformanceTests)."
      - "Full dotnet test is green. dotnet test --filter \"Category=Conformance\" is green."
    notes: |
      P2 introduces the first grouping parent (ArithmeticError). The
      Matches subtype walk lands in P1 - P2 is the first use of it.
      Confirm with a runtime test that `catch (ArithmeticError e)` after
      `catch (DivisionByZeroError e)` is unreachable (the analyzer's
      existing SA0169 flags it; the conformance test asserts the runtime
      behavior is consistent).

