  - Stash.Bytecode/VM/VirtualMachine.TypeOps.cs
  - Stash.Bytecode/VM/VirtualMachine.Modules.cs
  - Stash.Bytecode/Runtime/RuntimeOps.cs
  - Stash.Core/Runtime/Types/**
