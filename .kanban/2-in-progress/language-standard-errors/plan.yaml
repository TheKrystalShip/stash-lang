# plan.yaml - small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose in
# brief.md; keep only script inputs here.
# Validate with: stash scripts/checkpoint/checkpoint.stash validate-spec language-standard-errors

schema_version: 1

feature: language-standard-errors

title: "Error-Type Taxonomy - seal Errors section and retype the runtime"

# Fourth unit of the language-standard milestone. Reuses the Conformance/<Area>/
# scaffold + trait guard from language-standard-async (unit #1), values (unit #2),
# and equality (unit #3). Seals "Errors and Cleanup" section + the cross-cutting
# error-type taxonomy (coverage.md cross-cutting workstream #2).
milestone: language-standard

brief: ./brief.md

created: 2026-06-07
architect_session: language-standard-errors-architect-2026-06-07

# Default verify command run after every phase (cheap; per-phase verify holds the
# heavier filters).
default_verify:
  - dotnet build Stash.sln

# Broad scope - safety rail, not prison.
scope:
