# plan.yaml — small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose in
# brief.md; keep only script inputs here.
# Validate with: python3 scripts/checkpoint/validate-spec.py registry-authz-pipeline

schema_version: 1

feature: registry-authz-pipeline
title: Registry Authorization Pipeline Redesign
brief: ./brief.md
created: 2026-05-30
architect_session: registry-authz-pipeline-spec-2

# Cheap default — heavier checks live in per-phase verify.
default_verify:
  - dotnet build

# Safety rail. Implementers may correct stale paths within a phase's intent.
scope:
  - Stash.Registry/**
  - Stash.Tests/Registry/**
  - docs/Registry — Package Registry.md
  - examples/registry/**

phases:
  - id: P1
    title: PDP core — closed (Action, Resource, Principal) model + coarse-ceiling resolver
    deps: []
    files:
      - Stash.Registry/Auth/Authorization/IRegistryAuthorizer.cs
      - Stash.Registry/Auth/Authorization/RegistryAuthorizer.cs
      - Stash.Registry/Auth/Authorization/RegistryAction.cs
      - Stash.Registry/Auth/Authorization/ResourceRef.cs
      - Stash.Registry/Auth/Authorization/Principal.cs
      - Stash.Registry/Auth/Authorization/AuthzDecision.cs
      - Stash.Registry/Auth/Authorization/IPermissionResolver.cs
      - Stash.Registry/Auth/Authorization/PermissionResolver.cs
      - Stash.Registry/Auth/Authorization/TokenCeiling.cs
      - Stash.Registry/Auth/Authorization/ScopeOwnershipPolicyKind.cs
      - Stash.Registry/Auth/Authorization/PackageRoute.cs
      - Stash.Registry/Startup.cs
      - Stash.Tests/Registry/Authz/RegistryAuthorizerTests.cs
      - Stash.Tests/Registry/Authz/PermissionResolverTests.cs
    verify:
      - dotnet build Stash.Registry/Stash.Registry.csproj
      - dotnet test --filter "FullyQualifiedName~RegistryAuthorizerTests|FullyQualifiedName~PermissionResolverTests"
    done_when:
      - IRegistryAuthorizer.AuthorizeAsync runs the two-step intersection (ceiling check first, then resource-side check) and returns AuthzDecision with a typed AuthzDenyReason for every action in the closed RegistryAction enum.
      - Ceiling happy path — a publish-ceiling principal with publisher role on @acme/widgets receives ALLOW from PublishVersion; a read-ceiling principal asking ReadPackageMetadata on a public package receives ALLOW.
      - Ceiling fail path — a read-ceiling principal asking PublishVersion receives DENY with reason TokenScopeInsufficient even when the resource-side role is owner; an anonymous principal asking PublishVersion receives DENY with NotAuthenticated.
      - PermissionResolver computes the highest role from direct user + team-mediated + org-mediated grants over the existing PackageRoleEntry schema (no DB schema change); unit-tested with at least one ALLOW and one DENY per inheritance path.
      - Admin-narrow happy path — a principal with Role=admin and publish ceiling asking PublishVersion on a package she holds no direct role on receives ALLOW (admin resolves the resource-side dimension to effective owner).
      - Admin-narrow fail path — a principal with Role=admin and read ceiling asking PublishVersion receives DENY with TokenScopeInsufficient (ceiling check runs first; admin does NOT bypass it).
      - Visibility happy/fail — public package read ALLOWS anonymous; private package read DENIES anonymous and a no-role authenticated principal with VisibilityHidden; internal package ALLOWS an org member of the org-owned scope and DENIES a non-member.
      - Principal has UserPrincipal(Username, UserRole, TokenCeiling, TokenId) only — no TokenCapabilities, no TokenCapabilityRule, no IsUnrestricted appear anywhere under Stash.Registry/Auth/Authorization/.
      - AuthzDenyReason does NOT include TokenCapabilityScopeMiss (that reason ships with the deferred fine-grained capability feature).
      - No controller or service references the new IRegistryAuthorizer yet (wiring lands in P2/P3); registry builds green.
    notes: |
      This phase introduces the engine and unit-tests it. The fine-grained
      TokenCapabilities concept from the prior revision is intentionally
      ABSENT — the only token-side dimension is the coarse TokenCeiling.

  - id: P2
    title: Default-deny meta-test + [PublicEndpoint] attribute + annotate every existing endpoint
    deps: [P1]
    files:
      - Stash.Registry/Auth/Authorization/PublicEndpointAttribute.cs
      - Stash.Registry/Controllers/AuthController.cs
      - Stash.Registry/Controllers/PackagesController.cs
      - Stash.Registry/Controllers/OrganizationsController.cs
      - Stash.Registry/Controllers/ScopesController.cs
      - Stash.Registry/Controllers/SearchController.cs
      - Stash.Registry/Controllers/AdminController.cs
      - Stash.Tests/Registry/AuthzCoverageMetaTests.cs
      - Stash.Tests/Registry/Fixtures/UnclassifiedEndpointFixtureController.cs
      - Stash.Tests/Registry/Fixtures/ClassifiedEndpointFixtureController.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~AuthzCoverageMetaTests"
    done_when:
      - PublicEndpointAttribute exists with a mandatory Justification argument.
      - Meta-test happy path — AuthzCoverageMetaTests enumerates every controller action across the six registry controllers and reports zero unclassified endpoints with all current annotations in place.
      - Meta-test fail path — a deliberate UnclassifiedEndpointFixtureController action (no Authorize, no PublicEndpoint) causes the meta-test to flag that exact endpoint by ControllerName.ActionName; a deliberate ClassifiedEndpointFixtureController with [PublicEndpoint("test")] does NOT trip the meta-test.
      - No [AllowAnonymous] attributes remain anywhere under Stash.Registry/Controllers/. Every previously-anonymous endpoint (login, register, public package reads, scope/org lookups, search, health) is marked [PublicEndpoint("<reason>")].
      - dotnet build and the meta-test both pass — every existing controller is in compliance at the end of this phase.
    notes: |
      Controllers still use the legacy RequireXxxScope policies here; the
      PDP swap happens in P3 (packages), P4 (org/scope/admin), P5 (auth).

  - id: P3
    title: Package-write migration — route-authoritative PublishAsync + CreatePackage/PublishVersion split + role matrix wired
    deps: [P2]
    files:
      - Stash.Registry/Controllers/PackagesController.cs
      - Stash.Registry/Services/PackageService.cs
      - Stash.Registry/Auth/Authorization/PackageRoute.cs
      - Stash.Tests/Registry/Authz/RegistryAuthzBugATests.cs
      - Stash.Tests/Registry/Authz/RegistryAuthzBugBTests.cs
      - Stash.Tests/Registry/Authz/RegistryAuthzRoleMatrixWriteTests.cs
    verify:
      - dotnet build Stash.Registry/Stash.Registry.csproj
      - dotnet test --filter "FullyQualifiedName~RegistryAuthzBugATests|FullyQualifiedName~RegistryAuthzBugBTests|FullyQualifiedName~RegistryAuthzRoleMatrixWriteTests"
    done_when:
      - PackagesController.PublishPackage calls IRegistryAuthorizer with CreatePackage when the route resource does not yet exist and PublishVersion when it does; both decisions are gated solely on the PDP.
      - PackageService.PublishAsync accepts an authoritative PackageResource (from PackageRoute.From(scope, name)) and rejects with 400 ManifestRouteMismatch when manifest.Name disagrees with that resource (Bug B name-mismatch).
      - Manifest VERSION mismatch (Q5) — PackageService.PublishAsync rejects 400 ManifestRouteMismatch when manifest.Version disagrees with the intended version derived from the request; the test names the version field in the error detail.
      - Bug A happy path — under ScopeOwnershipPolicy=open, publishing into an UNOWNED scope auto-claims it and the PUT succeeds 201; under any policy, publishing into a scope the caller (or her org) owns succeeds 201.
      - Bug A fail path — with ScopeOwnershipPolicy=claim (default), publishing into an unowned scope returns 403 ScopeNotOwned and the package is NOT created; publishing into a someone-else-owned scope returns 403 ScopeNotOwned under every policy; publishing into @stash or @admin returns 403 ScopeReserved under every policy, including for an admin-role caller.
      - Role-matrix happy path — bob assigned publisher (not owner) PUTs a new version successfully (201); carol assigned maintainer DELETEs a version (200) and PATCHes .../deprecate (200); dan assigned reader GETs a private package (200).
      - Role-matrix fail path — bob assigned publisher receives 403 PackageRoleInsufficient on PATCH .../visibility (owner-only); dan assigned reader receives 403 PackageRoleInsufficient on any write; an unrelated user eve receives 404 (not 403) on the private package.
      - No PackagesController write endpoint hard-codes "owner" anymore; grep "HasPackagePermissionAsync(.*\"owner\"" Stash.Registry/Controllers/PackagesController.cs returns zero matches.
      - PackagesController.CanReadPackageAsync is deleted and the three read endpoints delegate to IRegistryAuthorizer; private packages still return 404 (not 403) to unauthorized callers.
    notes: |
      This is the highest-risk phase. Integration tests run end-to-end
      against WebApplicationFactory using
      UseSolutionRelativeContentRoot("Stash.Registry") per the repo Known
      Issue.

  - id: P4
    title: Org / Scope / Admin migration + ScopeOwnershipPolicy enum + claim gauntlet + verified scaffolding
    deps: [P3]
    files:
      - Stash.Registry/Controllers/OrganizationsController.cs
      - Stash.Registry/Controllers/ScopesController.cs
      - Stash.Registry/Controllers/AdminController.cs
      - Stash.Registry/Controllers/SearchController.cs
      - Stash.Registry/Configuration/SecurityConfig.cs
      - Stash.Registry/appsettings.json
      - Stash.Registry/Auth/Authorization/ScopeChallengeService.cs
      - Stash.Registry/Contracts/ScopeContracts.cs
      - Stash.Tests/Registry/Authz/ScopeOwnershipPolicyTests.cs
      - Stash.Tests/Registry/Authz/ScopeClaimVerifiedFlowTests.cs
      - Stash.Tests/Registry/Authz/OrgAndAdminAuthzTests.cs
    verify:
      - dotnet build Stash.Registry/Stash.Registry.csproj
      - dotnet test --filter "FullyQualifiedName~ScopeOwnershipPolicyTests|FullyQualifiedName~ScopeClaimVerifiedFlowTests|FullyQualifiedName~OrgAndAdminAuthzTests"
    done_when:
      - SecurityConfig.ScopeOwnershipPolicy is a ScopeOwnershipPolicyKind enum (Open|Claim|Verified) defaulting to Claim, deserialized from appsettings.json and consumed by IRegistryAuthorizer on CreatePackage.
      - Open happy path — CreatePackage into an unowned scope auto-claims it as a user-scope for the caller; a subsequent GET /api/v1/scopes/{scope} reflects the new owner; package row is created.
      - Open fail path — CreatePackage into a scope already owned by another user returns 403 ScopeNotOwned; the existing scope ownership is unchanged.
      - Claim fail path — CreatePackage into an unowned scope returns 403 ScopeNotOwned with the documented "run stash pkg scope claim" message; no scope or package row is created.
      - Verified happy/fail — POST /api/v1/scopes with verification_method="dns-txt" returns 201 with a challenge body containing record_name, record_value, expires_at, and state="pending"; POST /api/v1/scopes/{scope}/verify returns 501 NotImplemented (DNS-TXT / well-known resolver stubbed this phase per Q4) with the documented body shape echoing the configured method.
      - Pending-as-unowned (Verified) — under ScopeOwnershipPolicy=Verified, CreatePackage into a scope whose state=pending is denied with the verification message (same branch as "scope does not exist"); a successful claim WITHOUT subsequent verification does not unlock CreatePackage.
      - Every endpoint in OrganizationsController, ScopesController, SearchController, AdminController is authorized through IRegistryAuthorizer; grep "HasPackagePermissionAsync" across those four controllers returns zero matches.
      - Search filter — search results omit private/internal packages the caller cannot see via the PDP-backed predicate; a public package is returned for anonymous; a private package is returned only to a principal whose PDP role on it is at least reader.
    notes: |
      Verified-mode resolver is stubbed 501 per Q4; the wire contract is
      locked. SecurityConfig.MaxTokenLifetime is introduced in P5 (the
      auth/tokens endpoint owns the cap).

  - id: P5
    title: Token issuance — read-default at login + MaxTokenLifetime cap + admin-narrow ceiling-first
    deps: [P4]
    files:
      - Stash.Registry/Controllers/AuthController.cs
      - Stash.Registry/Auth/JwtTokenService.cs
      - Stash.Registry/Database/Models/TokenRecord.cs
      - Stash.Registry/Configuration/SecurityConfig.cs
      - Stash.Registry/appsettings.json
      - Stash.Registry/Contracts/AuthContracts.cs
      - Stash.Registry/Auth/Authorization/Principal.cs
      - Stash.Tests/Registry/Authz/LoginReadDefaultTests.cs
      - Stash.Tests/Registry/Authz/TokenLifetimeCapTests.cs
      - Stash.Tests/Registry/Authz/AdminNarrowCeilingTests.cs
    verify:
      - dotnet build Stash.Registry/Stash.Registry.csproj
      - dotnet test --filter "FullyQualifiedName~LoginReadDefaultTests|FullyQualifiedName~TokenLifetimeCapTests|FullyQualifiedName~AdminNarrowCeilingTests"
    done_when:
      - Login read-default happy path — POST /api/v1/auth/login mints an access token whose token_scope claim is "read" (verified by decoding the returned JWT); GET /api/v1/packages/public/x succeeds 200 with the token.
      - Login read-default fail path — the same login token receives 403 TokenScopeInsufficient on PUT /api/v1/packages/...; after issuing a publish-ceiling token via POST /api/v1/auth/tokens the same PUT succeeds.
      - 'POST /api/v1/auth/tokens accepts a body shaped (name, ceiling, expires_in) with NO capabilities array; the request shape is rejected 400 if a capabilities field is supplied (explicit guard against the deferred shape leaking in).'
      - 'Token lifetime cap happy path — POST /api/v1/auth/tokens with expires_in="30d" and Security.MaxTokenLifetime="90d" returns 201 with a token whose exp claim is approximately now+30d.'
      - 'Token lifetime cap fail path — POST /api/v1/auth/tokens with expires_in="365d" returns 400 TokenLifetimeExceeded; the response body echoes the configured MaxTokenLifetime ("90d").'
      - 'Token lifetime cap fail path — POST /api/v1/auth/tokens with expires_in absent or invalid returns 400 with a typed error.'
      - The coarse ceiling is stored in the existing TokenRecord.Scope column (values "read"/"publish"/"admin") — no new column is added; TokenRecord has no Capabilities field.
      - JWT carries the token_scope (ceiling) claim plus a token_id pointing at the DB row; JwtTokenService and the JwtBearer OnTokenValidated path reconstruct the full Principal (no TokenCapabilities reconstruction).
      - Admin-narrow happy path — admin alice with a publish-ceiling token PUTs /api/v1/packages/foo/bar (a package she holds no direct role on) and succeeds 201 (admin resolves resource-side to owner).
      - Admin-narrow fail path — admin alice with a read-ceiling token PUTting /api/v1/packages/foo/bar receives 403 TokenScopeInsufficient (ceiling check runs first; admin does NOT bypass it).
      - Expired token fail path — a token whose exp is in the past receives 401 TokenExpired on any endpoint that requires authentication.
    notes: |
      MaxTokenLifetime lives in SecurityConfig with a TimeSpan default of
      90.00:00:00 and is wired into appsettings.json.

  - id: P6
    title: Authorization conformance matrix — table-driven cross-product (ceiling × role × visibility × policy)
    deps: [P5]
    files:
      - Stash.Tests/Registry/RegistryAuthzMatrixTests.cs
      - Stash.Tests/Registry/Authz/AuthzMatrixData.cs
    verify:
      - dotnet build Stash.Tests/Stash.Tests.csproj
      - dotnet test --filter "FullyQualifiedName~RegistryAuthzMatrixTests"
    done_when:
      - RegistryAuthzMatrixTests is a SINGLE table-driven xUnit class under Stash.Tests/Registry/ whose [Theory] data covers the FULL cross-product of (TokenCeiling × PackageRole × Visibility × ScopeOwnershipPolicy) with one ALLOW expectation and one DENY expectation per cell.
      - Role-axis coverage — for each of reader / publisher / maintainer / owner, the suite asserts the role CAN perform every matrix-permitted action AND CANNOT perform every higher action (the higher actions deny with PackageRoleInsufficient). Role inheritance is covered three ways per role — direct grant, team-mediated grant, org-owner-inherited grant — each as its own theory row.
      - Ceiling-axis coverage — for each of read / publish / admin, the suite asserts allowed actions pass and higher-ceiling actions are denied with TokenScopeInsufficient.
      - Intersection cells (security crux) — owner role + read token requesting PublishVersion → DENY TokenScopeInsufficient; reader role + admin token requesting PublishVersion → DENY PackageRoleInsufficient (ceiling allows, resource denies); admin role + read token requesting any write → DENY TokenScopeInsufficient (Q2 narrow).
      - Visibility coverage — for each of public, private, internal — every ALLOW branch is asserted (public anonymous; private reader+; internal org-member of org-owned scope; internal owning user of user-owned scope; internal direct reader) AND the corresponding deny branches (private anonymous DENIES with VisibilityHidden mapped to 404; internal non-member DENIES).
      - ScopeOwnershipPolicy coverage — Open auto-claims an unowned scope, but denies a different-owner scope with ScopeNotOwned; Claim denies an unowned scope with ScopeNotOwned and the documented message; Verified treats a pending scope as unowned and denies with the verification message.
      - Bug A regression cells — publishing a new package into a scope owned by someone else is DENIED ScopeNotOwned; reserved @stash and @admin are DENIED ScopeReserved under all three policies, including for an admin-role caller.
      - Bug B regression cells — manifest/route NAME mismatch is rejected 400 ManifestRouteMismatch; manifest/route VERSION mismatch is rejected 400 ManifestRouteMismatch.
      - Token cells — the default-login token (read ceiling) is denied PublishVersion until a publish token is explicitly issued; an expired token is denied with TokenExpired; a POST /auth/tokens request with expires_in exceeding Security.MaxTokenLifetime is rejected with TokenLifetimeExceeded.
      - The suite runs end-to-end through IRegistryAuthorizer (not by re-implementing the matrix in the test), and uses WebApplicationFactory with UseSolutionRelativeContentRoot("Stash.Registry") for HTTP-level cells.
    notes: |
      This phase owns NO production code; it is the dedicated Q7
      conformance suite. It depends on every enforcement phase (P1–P5)
      being done so the matrix exercises the real PDP, not a fake.

  - id: P7
    title: Docs + example + cleanup (delete dead permission helpers and string policies)
    deps: [P6]
    files:
      - docs/Registry — Package Registry.md
      - examples/registry/authz-flow.md
      - Stash.Registry/Startup.cs
      - Stash.Registry/Controllers/PackagesController.cs
      - Stash.Registry/Database/IRegistryDatabase.cs
      - Stash.Registry/Database/StashRegistryDatabase.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~RegistryAuthzMatrixTests|FullyQualifiedName~AuthzCoverageMetaTests"
    done_when:
      - docs/Registry — Package Registry.md documents the PDP model, the closed RegistryAction enum, the role→permission matrix, the ScopeOwnershipPolicy enum + per-policy table, the verified-mode challenge/verify wire shapes (resolver stubbed 501), the coarse token ceiling, and Security.MaxTokenLifetime. The doc no longer mentions RequireReadScope/RequirePublishScope/RequireAdminScope/RequireAdmin as user-facing policies.
      - docs/Registry — Package Registry.md carries a "Deferred — fine-grained token capabilities" section pointing at the backlog stub; no part of the doc describes a token capabilities[] body or TokenCapabilityScopeMiss.
      - examples/registry/authz-flow.md walks through the canonical happy path on ScopeOwnershipPolicy=claim — register alice, stash pkg org create acme, POST /auth/tokens for a publish-ceiling token on alice, stash pkg publish @acme/widgets — and shows the corresponding DENY when a read-ceiling token is used by mistake.
      - Cleanup landed — HasPackagePermissionAsync removed from IRegistryDatabase and StashRegistryDatabase; the four legacy policies (RequireReadScope, RequirePublishScope, RequireAdminScope, RequireAdmin) removed from Startup.cs; CanReadPackageAsync gone from PackagesController.
      - grep "RequirePublishScope\|RequireReadScope\|RequireAdminScope\|RequireAdmin\|HasPackagePermissionAsync\|CanReadPackageAsync\|TokenCapabilities\|TokenCapabilityScopeMiss\|IsUnrestricted" Stash.Registry/ returns zero matches.
      - dotnet build green; the final_verify gate runs green end-to-end including RegistryAuthzMatrixTests, AuthzCoverageMetaTests, and the meta-test family.

# Final acceptance — `/done` runs this before promoting to 4-done/.
# Filter excludes ONLY documented env-flakies (see .claude/repo.md Known Issues)
# and KEEPS Registry* test classes (this feature's tests live there) AND the
# meta-test family (AuthzCoverageMetaTests, RegistryAuthzMatrixTests,
# Wave1ThrowsCoverageTests, CompletionSurfaceSnapshotTests,
# StandardLibraryReferenceTests). Registry tests need
# UseSolutionRelativeContentRoot("Stash.Registry") and are not
# blanket-excludable.
final_verify:
  - dotnet build
  - dotnet test --filter "FullyQualifiedName!~DiffPackageTests&FullyQualifiedName!~FirstRegistrationAdminTests&FullyQualifiedName!~AuthEndpointTests&FullyQualifiedName!~BasePathIntegrationTests&FullyQualifiedName!~FuzzHarnessTests&FullyQualifiedName!~FsWatchBuiltIns&FullyQualifiedName!~NetBuiltInsTests&FullyQualifiedName!~FormatRunner_ExcludeGlob&FullyQualifiedName!~AsyncFn_ParallelExecution&FullyQualifiedName!~TcpSend_ReturnsByteCount"
