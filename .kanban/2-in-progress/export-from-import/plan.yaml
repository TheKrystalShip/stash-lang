# plan.yaml — small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose in
# brief.md; keep only script inputs here.
# Validate with: python3 scripts/checkpoint/validate-spec.py export-from-import

schema_version: 1

feature: export-from-import
title: Module Exports — Re-export Forms

brief: ./brief.md

created: 2026-05-18
architect_session: opus-architect-2026-05-18

default_verify:
  - dotnet build Stash.sln

# Hard scope. Implementers may not touch files outside this list unless the
# phase explicitly extends scope.
scope:
  - Stash.Core/**
  - Stash.Bytecode/**
  - Stash.Analysis/**
  - Stash.Lsp/**
  - Stash.Playground/**
  - Stash.Tests/**
  - .vscode/extensions/stash-lang/**
  - docs/**
  - examples/**
  - CHANGELOG.md

phases:
  - id: 2A
    title: Parser + AST nodes for re-export forms
    deps: []
    files:
      - Stash.Core/Parsing/AST/ExportModuleAsStmt.cs
      - Stash.Core/Parsing/AST/ExportFromStmt.cs
      - Stash.Core/Parsing/AST/StmtType.cs
      - Stash.Core/Parsing/AST/IStmtVisitor.cs
      - Stash.Core/Parsing/Parser.cs
      - Stash.Tests/Parsing/ExportFromParserTests.cs
    verify:
      - dotnet build Stash.Core
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ExportFromParserTests"
    non_goals:
      - Do not implement the ModuleExportsBuilder changes (Phase 2C)
      - Do not emit compile output (Phase 2D)
      - Do not change the analyzer (Phase 2F)
      - Do not change the formatter output (Phase 2H)
      - Do not update docs (Phase 2J)
    done_when:
      - ExportModuleAsStmt and ExportFromStmt AST node types exist and round-trip the parser.
      - Parser accepts `export "p" as x;` and `export { a, b } from "p";` (with trailing-comma variant).
      - Parser accepts dynamic path expressions in both forms — `export some_const as x;` and `export { foo } from path_fn();` — mirroring import's grammar (D-9).
      - Parser rejects `export * from "p";` with an error message referencing SA0822.
      - Parser rejects `export "p";` (missing `as <alias>`).
      - "`export {} from \"p\";` parses (empty list is captured for SA0823 in Phase 2C)."
      - "`export {}` followed by `;` (no `from`) still produces ExportBlockStmt (back-compat with parent feature)."
      - IsExportKeyword path-form rule activates iff the next token is an expression starter AND the trailing tokens at depth 0 before the next `;` are `As Identifier Semicolon`.
      - "Regression: `export(42);` parses as an expression statement when `export` is in scope as an identifier (soft-keyword behavior preserved). `let cast = x as Foo;` parses unchanged."
      - IStmtVisitor<T> gains VisitExportModuleAsStmt and VisitExportFromStmt; existing implementations will not yet compile (stubbed in 2B).
    notes: |
      - In ExportDeclaration: after parsing `export { names }`, peek for the contextual `from`
        identifier; if present, produce ExportFromStmt, else produce ExportBlockStmt as today.
      - The `from` keyword is matched via ConsumeIdentifier("from", ...) — same as ImportStmt at
        Parser.cs:725. No new soft keyword machinery.
      - Path branch: at ExportDeclaration entry (after the reserved-form checks for Let/Extend/Import/
        LeftBrace/Fn/Const/Struct/Enum/Interface/async-fn), parse Expression() then `as <Identifier> ;`
        and produce ExportModuleAsStmt. This branch is only reached when IsExportKeyword's path-form
        lookahead already confirmed the trailing `as Identifier ;` shape.
      - IsExportKeyword (Parser.cs:2875): the path-form rule is a one-pass scan from _current+1 that
        tracks ()/[]/{} depth and stops at the first depth-0 semicolon. Activate iff (a) the token
        at _current+1 is an expression-starter (per IsExpressionStarter) AND (b) the three tokens
        immediately preceding the stopping semicolon are As, Identifier, Semicolon. Old gates
        (Fn/Const/Struct/Enum/Interface/Let/Extend/Import/LeftBrace/`async fn`) remain.
      - Verify Open Question Q4: confirm by inspection that Expression() cannot legitimately produce
        a token stream ending in `as Identifier ;` at depth 0 (the `as`-cast right-hand side is a
        type, not a bare identifier followed by a statement-terminating `;`). Add a regression test
        for `let x = y as Foo;` to ensure cast parsing is unaffected.
      - `export * from ...`: detect the `Star` token explicitly after `export` and raise a parse
        error whose message mentions wildcard re-export. The diagnostic code SA0822 is wired in 2C;
        for now use the parser's Error() with a clear message.
      - Est_tokens note: the path-form lookahead is mechanical and self-contained; phase 2A remains
        within its original token budget despite the broader grammar.

  - id: 2B
    title: Six-visitor pass-through stubs
    deps: [2A]
    files:
      - Stash.Core/Resolution/SemanticResolver.cs
      - Stash.Analysis/Visitors/SemanticValidator.cs
      - Stash.Analysis/Visitors/SymbolCollector.cs
      - Stash.Analysis/Visitors/SemanticTokenWalker.cs
      - Stash.Analysis/Visitors/StashFormatter.cs
      - Stash.Bytecode/Compilation/Compiler.Declarations.cs
    verify:
      - dotnet build Stash.sln
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ExportFromParserTests|FullyQualifiedName~ParserTests"
    non_goals:
      - Do not enforce any re-export semantics (those land in 2C/2D/2F).
      - Do not change formatter output — temporary placeholder only (polished in 2H).
      - Compiler stub must NOT yet emit Import/ImportAs instructions (those land in 2D).
    done_when:
      - All six visitors compile with VisitExportModuleAsStmt and VisitExportFromStmt.
      - The full solution builds.
      - All existing tests still pass.
    notes: |
      Pass-through rules:
      - SemanticResolver: resolve the Path expression for both nodes; return null.
      - SemanticValidator: return null (1C-equivalent rules added in 2C).
      - SymbolCollector: add the alias (ExportModuleAsStmt) or each name (ExportFromStmt) to the
        top-level scope as Namespace symbols, mirroring ImportAsStmt and ImportStmt.
      - SemanticTokenWalker: emit `keyword` at ExportKeyword and (for ExportFromStmt) at FromKeyword.
      - StashFormatter: minimal placeholder — `export <path> as <alias>;` and
        `export { a, b } from <path>;` on a single line. Polished in 2H.
      - Compiler.VisitExportModuleAsStmt / VisitExportFromStmt: throw NotImplementedException
        with a phase-locator comment. 2D replaces the stubs with real emission.

  - id: 2C
    title: ModuleExportsBuilder extension + SA0822/SA0823/SA0824 in validator
    deps: [2B]
    files:
      - Stash.Analysis/Models/ModuleExportsBuilder.cs
      - Stash.Analysis/Models/DiagnosticDescriptors.cs
      - Stash.Analysis/Visitors/SemanticValidator.cs
      - Stash.Tests/Analysis/ExportFromBuilderTests.cs
      - Stash.Tests/Analysis/ExportFromValidationTests.cs
    verify:
      - dotnet build Stash.Analysis
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ExportFromBuilderTests|FullyQualifiedName~ExportFromValidationTests|FullyQualifiedName~ExportSetBuilderTests|FullyQualifiedName~ExportValidationTests"
    non_goals:
      - Do not modify the compiler yet (Phase 2D).
      - Do not modify the VM (Phase 2E).
      - Do not modify ImportResolver yet (Phase 2F).
    done_when:
      - ModuleExportsBuilder.Build collects names from ExportModuleAsStmt (the alias) and from ExportFromStmt (every name).
      - ExportEntry records ExportSpan correctly for both new forms.
      - BuildTopLevelIndex registers the alias / re-exported names as Namespace entries with isImport=true so SA0808 duplicate detection works against them.
      - SA0822 (wildcard), SA0823 (empty list), SA0824 (alias collision) are registered in DiagnosticDescriptors and emitted at the correct sites.
      - SA0822 is wired from the parser's `export * from ...` rejection path (post-parse diagnostic).
      - All previously-passing ExportSetBuilderTests and ExportValidationTests still pass.
    notes: |
      - The validator owns SA0822/SA0823/SA0824; the parser only rejects `export * from` syntactically.
        For unified diagnostics, the parser can attach a "wildcard re-export detected at span X" marker
        that the validator converts to SA0822 — or the parser emits SA0822 directly via the same sink.
        Pick the path that mirrors how the parent feature handles SX001 today (verify by reading
        SemanticValidator.cs).
      - SA0824 fires only for ExportModuleAsStmt — the alias is a *local* binding too, and collisions
        with existing top-level decls/imports must be reported. ExportFromStmt names that collide
        with locals are caught by ordinary symbol-redeclaration diagnostics, which already exist.
      - Continue numbering in SA08xx range (parent feature used SA0805–SA0808).

  - id: 2D
    title: Compiler emits Import/ImportAs sequences for re-export nodes
    deps: [2C]
    files:
      - Stash.Bytecode/Compilation/Compiler.cs
      - Stash.Bytecode/Compilation/Compiler.Declarations.cs
      - Stash.Tests/Bytecode/ExportFromCompilerTests.cs
    verify:
      - dotnet build Stash.Bytecode
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ExportFromCompilerTests"
    non_goals:
      - Do NOT add new opcodes. The dispatch loop size constraint is binding.
      - Do NOT change Chunk.cs, Metadata.cs, BytecodeWriter.cs, or BytecodeReader.cs.
      - Do NOT change VirtualMachine.Modules.cs (Phase 2E owns runtime tests).
    done_when:
      - Compiler.VisitExportModuleAsStmt emits the *same* bytecode sequence as VisitImportAsStmt with equivalent arguments — this automatically binds the alias as a local namespace in the current module (D-12).
      - Compiler.VisitExportFromStmt emits the *same* bytecode sequence as VisitImportStmt with equivalent arguments — this automatically binds the selected names as locals in the current module (D-12).
      - Disassembly of a script with `export "p" as p;` is identical to disassembly of `import "p" as p;` except for source spans.
      - No entries are added to OpCode.cs or to the bytecode serializer.
      - Tests verify the instruction sequences match the equivalent hand-written import.
      - Test verifies same-module local binding compiles correctly — a script with `export "lib/x.stash" as x; let v = x.foo();` resolves `x.foo()` without error.
    notes: |
      - The export-set contribution is *not* the compiler's responsibility — ModuleExportsBuilder
        (Phase 2C) already collects the names into Chunk.Exports via the pipeline that hands
        ModuleExports to Compiler.Compile.
      - Implementation strategy: factor the existing Import/ImportAs emission into private helpers
        (EmitImport, EmitImportAs) and call them from the new visitors. Avoids drift between the
        two surface forms.
      - Verify: `stash --disassemble` on `export "p" as p;` matches `import "p" as p;` modulo spans.

  - id: 2E
    title: VM end-to-end verification (tests only; zero source changes)
    deps: [2D]
    files:
      - Stash.Tests/Bytecode/ReexportRuntimeTests.cs
    verify:
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ReexportRuntimeTests"
    non_goals:
      - Do NOT modify any VM file. If a test fails, the bug is in Phase 2C/2D — fix there.
      - Do NOT modify VirtualMachine.Modules.cs, the dispatch loop, or BuildExportedEnvironment.
    done_when:
      - Single-level namespace re-export (`export "x.stash" as x;`) is observable in an importer.
      - Single-level selective re-export (`export { foo } from "x.stash";`) is observable.
      - Three-level transitive re-export chain (A → B → C, A exposes a name originally defined in C) returns the C-defined value.
      - Re-exporting the same module twice (two different aliases for the same path) shares the ModuleCache entry (module body runs once).
      - Re-export of a name that is *not* in the source module's export set fails at module-load time with the parent feature's "Module does not export 'X'" error (Phase 2F upgrades this to a static SA0825 diagnostic).
      - Same-module use (D-12) — `export "lib/x.stash" as x; let v = x.foo();` evaluates `x.foo()` correctly in the same module that re-exports `x`.
      - Same-module use (D-12) — `export { foo } from "lib/x.stash"; let v = foo();` evaluates `foo()` correctly in the same module.
      - Dynamic path expression (D-9) — `const P = "lib/x.stash"; export P as x;` loads `lib/x.stash` at module-load time, mirroring `import P as x;`.
      - All existing ImportExportRuntimeTests still pass.
    notes: |
      This phase exists to *prove* the desugar strategy works end-to-end without touching the VM.
      If the verify fails, fix Phase 2C or 2D — do NOT touch VirtualMachine.Modules.cs.

  - id: 2F
    title: Analyzer ImportResolver — SA0825 source-export check + SA0826 cycle detection + ExportEntry.OriginPath
    deps: [2C]
    files:
      - Stash.Analysis/Resolvers/ImportResolver.cs
      - Stash.Analysis/Models/ModuleExportsBuilder.cs
      - Stash.Analysis/Models/DiagnosticDescriptors.cs
      - Stash.Analysis/Engines/AnalysisEngine.cs
      - Stash.Tests/Analysis/ReexportResolverTests.cs
    verify:
      - dotnet build Stash.Analysis
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ReexportResolverTests|FullyQualifiedName~ImportResolverTests|FullyQualifiedName~ImportResolverExportTests"
    non_goals:
      - Do not modify the VM (Phase 2E).
      - Do not modify LSP handlers (Phase 2G).
    done_when:
      - ImportResolver walks ExportFromStmt and ExportModuleAsStmt to add their targets to the import graph.
      - For each ExportFromStmt name, the resolver verifies the source module's Exports.Names contains the name (when HasExplicitExports == true) and emits SA0825 otherwise.
      - The resolver detects cycles in the *re-export subgraph* and emits SA0826. Ordinary import edges do not count toward cycle detection.
      - ExportEntry (in ModuleExportsBuilder.cs) gains an optional OriginPath set to the resolved source-module path for re-exported names; null for locally-exported names.
      - SA0827 (redundant `import { x } from "p"; export { x };` pair) is registered and emitted as an **information-level hint only** (no code action in this feature — see D-10).
      - Unused-import diagnostic (D-11) treats any `export` statement — `export { x };`, `export { x } from "p";`, or `export "p" as x;` — as a use of the imported name/module. Test: a barrel module that only imports and only re-exports MUST NOT trigger the unused-import diagnostic.
      - Dependency tracking invalidates dependents when a re-export target's export set changes.
    notes: |
      - The cycle detection runs on a graph whose edges are only re-export edges
        (ExportFromStmt and ExportModuleAsStmt targets). Build this graph during the resolver
        walk; detect cycles via standard DFS/colour algorithm.
      - The OriginPath enrichment is the only thing the bytecode layer never sees — it lives
        on Analysis's ExportEntry, not on Core's ModuleExports.

  - id: 2G
    title: LSP — hover/go-to-def via OriginPath + `from` semantic token
    deps: [2F]
    files:
      - Stash.Lsp/Handlers/HoverHandler.cs
      - Stash.Lsp/Handlers/DefinitionHandler.cs
      - Stash.Analysis/Visitors/SemanticTokenWalker.cs
      - Stash.Tests/Lsp/ReexportLspTests.cs
    verify:
      - dotnet build Stash.Lsp
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ReexportLspTests"
    non_goals:
      - Do not change CodeActionHandler — "add missing import" works for re-exports automatically through ModuleInfo.Exports.
      - Do not change DAP.
    done_when:
      - Hover on a re-exported name in the importer shows the original declaration from the source module.
      - Go-to-definition on a re-exported name jumps to the source module's declaration, not to the `export ... from` line.
      - Semantic tokens emit `keyword` for the `from` contextual identifier inside ExportFromStmt.
      - The existing parent-feature LSP behavior (hover/goto on locally-exported names) is unchanged.
    notes: |
      - The HoverHandler and DefinitionHandler consult ModuleInfo.Exports — when ExportEntry.OriginPath
        is non-null, follow the path to look up the declaration in the origin module's symbol table.
      - SemanticTokenWalker.VisitExportFromStmt already exists from Phase 2B as a stub; this phase
        adds the FromKeyword emission and confirms the export keyword emission is correct.

  - id: 2H
    title: Formatter pretty-printing for re-export forms
    deps: [2B]
    files:
      - Stash.Analysis/Visitors/StashFormatter.cs
      - Stash.Tests/Format/ReexportFormatterTests.cs
    verify:
      - dotnet build Stash.Analysis
      - dotnet build Stash.Tests
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ReexportFormatterTests|FullyQualifiedName~ExportFormatterTests|FullyQualifiedName~FormatterTests"
    non_goals:
      - Do not change ImportSorter or reorder re-export blocks.
      - Do not change non-export formatting.
    done_when:
      - VisitExportModuleAsStmt prints `export <path-expr> as <alias>;` on a single line.
      - VisitExportFromStmt prints `export { a, b, c } from <path-expr>;` on one line if it fits the print width.
      - When it does not fit, it breaks across lines with one identifier per line, trailing comma, mirroring the destructured-import printer.
      - Round-trip formatting is idempotent (format-format-format yields a stable output).

  - id: 2I
    title: Playground tokenizer + VS Code tmLanguage regression coverage
    deps: [2A]
    files:
      - Stash.Playground/wwwroot/js/stash-language.js
      - .vscode/extensions/stash-lang/syntaxes/stash.tmLanguage.json
      - Stash.Tests/Grammar/ReexportGrammarTests.cs
    verify:
      - dotnet build Stash.Playground
      - dotnet test Stash.Tests --filter "FullyQualifiedName~ReexportGrammarTests"
    non_goals:
      - Do not add new tokens — the new forms reuse `export` and `from` which are already present.
      - Do not change tree-sitter or any other grammar (out of scope).
    done_when:
      - The Monarch grammar (Stash.Playground) tokenises `export "p" as p;` and `export { a } from "p";` without errors.
      - The tmLanguage grammar applies `keyword.control` to `export` and `from` in the new forms.
      - Regression tests cover both forms.

  - id: 2J
    title: Docs, language spec update, example
    deps: [2A]
    files:
      - docs/Stash — Language Specification.md
      - examples/reexport_barrel.stash
      - CHANGELOG.md
    verify:
      - dotnet build Stash.sln
    non_goals:
      - Do not edit the generated docs/Stash — Standard Library Reference.md.
      - Do not edit CLAUDE.md or AGENTS.md.
    done_when:
      - Language spec gains a "Re-exports" subsection under "Source Files and Modules > Exports" that documents both forms with examples and the SA0822–SA0827 diagnostics.
      - The BNF section of the spec adds the `exportModuleAs` and `exportFrom` productions (with `expression` as the path, matching `import`'s grammar) and references them from the top-level statement rule.
      - The spec explicitly documents that a re-export statement also binds its alias / selected names as locals in the current module (D-12), with a short example showing same-file use.
      - The spec documents that re-export statements count as uses for the unused-import diagnostic (D-11).
      - examples/reexport_barrel.stash demonstrates a barrel file using both new forms, plus an importer that confirms the runtime behavior, plus same-module use of a re-exported name.
      - CHANGELOG.md gains a bullet describing the new forms and noting that `.stashc` is unchanged.

# Final acceptance command — run by `/done` before promoting to 4-done/.
final_verify:
  - dotnet build Stash.sln
  - dotnet test Stash.Tests --filter "FullyQualifiedName~ExportFromParserTests|FullyQualifiedName~ExportFromBuilderTests|FullyQualifiedName~ExportFromValidationTests|FullyQualifiedName~ExportFromCompilerTests|FullyQualifiedName~ReexportRuntimeTests|FullyQualifiedName~ReexportResolverTests|FullyQualifiedName~ReexportLspTests|FullyQualifiedName~ReexportFormatterTests|FullyQualifiedName~ReexportGrammarTests"
