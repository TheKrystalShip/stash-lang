# Validate with: stash scripts/checkpoint/checkpoint.stash validate-spec language-standard-async

schema_version: 1

feature: language-standard-async

title: "Language Standard: Seal Â§Async"

# First unit of the language-standard milestone â€” pattern-setter for Conformance/<Area>/.
milestone: language-standard

brief: ./brief.md

created: 2026-06-06
architect_session: language-standard-async-architect-2026-06-06

# Default verify command run after every phase (cheap; full test runs in per-phase verify).
default_verify:
