# plan.yaml — small machine-readable phase plan
#
# Authored by the architect, consumed by checkpoint scripts. Keep design prose
# in brief.md; keep only script inputs here.
# Validate with: stash scripts/checkpoint/validate-spec.stash pkg-cli-api-parity
#
# Re-specced 2026-06-02 against the post-registry-authz-* API:
#   - Original P1 (server revoke endpoint) DELETED — already shipped by
#     registry-authz-pipeline P3 (commit 154671b4) with D18 last-owner semantics.
#   - Phases renumbered P1..P7 (was P2..P8); no commits had landed, so a clean
#     renumber is safe.
#   - Role/visibility commands target the self-service publish routes at a uniform
#     publish ceiling (RegistryAuthorizer.cs:115-119), not the admin routes.
#   - visibility get + org membership display deferred to backlog (no server read
#     path); see .kanban/0-backlog/bugs/.
#
# Re-pointed 2026-06-03 onto the shared Stash.Registry.Contracts assembly
# (shipped 2026-06-03 via shared-registry-contracts, merge 953d799f):
#   - P1 scope path updated: Stash.Registry/Contracts/PackageContracts.cs ->
#     Stash.Registry.Contracts/PackageContracts.cs (the old path no longer exists).
#   - P2 re-pointed: consume the wire DTOs from Stash.Registry.Contracts (they
#     all already exist there) and register the still-unregistered ones in
#     CliJsonContext. The CLI authors no mirror DTO classes — the CLI->shared
#     migration is already complete (zero CLI-local request/response DTOs remain).
#   - P3..P7 unchanged.

schema_version: 1

feature: pkg-cli-api-parity
title: Stash pkg CLI parity with scoped registry API
brief: ./brief.md

created: 2026-05-30
architect_session: pkg-cli-api-parity-respec-2026-06-02

# Cheap default that every phase runs after its own verify.
default_verify:
  - dotnet build

# Broad scope rail. Implementers may stray slightly when discovery is stale,
# but should keep changes to these areas. (No AdminController / Services / backlog
# stub — the server revoke work is already shipped; this feature is CLI + the one
# PackageDetailResponse cleanup.)
scope:
  - Stash.Cli/PackageManager/**
  - Stash.Registry.Contracts/PackageContracts.cs
  - Stash.Registry/Controllers/PackagesController.cs
  - Stash.Tests/**
  - docs/PKG — Package Manager CLI.md
  - docs/Registry — Package Registry.md
  - examples/package_roles.stash

phases:
  - id: P1
    title: Drop owners field from PackageDetailResponse
    deps: []
    files:
      - Stash.Registry.Contracts/PackageContracts.cs
      - Stash.Registry/Controllers/PackagesController.cs
      - Stash.Cli/PackageManager/Commands/InfoCommand.cs
      - Stash.Tests/Registry/PackageDetailResponseTests.cs
      - Stash.Tests/Cli/PackageInfoCommandTests.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~PackageDetailResponseTests|FullyQualifiedName~PackageInfoCommandTests"
    done_when:
      - PackageDetailResponse has no Owners property and PackagesController.GetPackage no longer derives an owners list; the solution compiles with no remaining references to the removed property.
      - GET /api/v1/packages/{scope}/{name} JSON response no longer contains an "owners" key.
      - InfoCommand.Render no longer prints an "Owners:" section (the owners[] block at InfoCommand.cs:107-122 is removed) and stash pkg info output omits owners.
    notes: |
      Do NOT rewire `stash pkg info` to call GetRoles — `info` is anonymous while
      GET .../roles needs a publish token. `info` simply stops showing owners;
      `stash pkg role list` (P3) becomes the canonical, principal-typed reader.
      InfoCommand parses the raw JSON `owners` key at runtime, so removing the
      server property does not break it at compile time; just delete the render
      block. The legacy RegistryClient owner helpers (GetOwners/AddOwner/
      RemoveOwner) are NOT touched here — they are deleted in P3 alongside
      OwnerCommand (their only caller), to keep every phase boundary compilable.

  - id: P2
    title: RegistryClient parity methods consuming Stash.Registry.Contracts + AOT serializer registration
    deps: [P1]
    files:
      - Stash.Cli/PackageManager/RegistryClient.cs
      - Stash.Cli/PackageManager/CliJsonContext.cs
      - Stash.Tests/Cli/RegistryClientParityTests.cs
    verify:
      - dotnet build Stash.Cli
      - dotnet test --filter "FullyQualifiedName~RegistryClientParityTests"
      - dotnet publish Stash.Cli -c Release -o /tmp/stash-cli-aot-p2
    done_when:
      - RegistryClient exposes SetVisibility, GetRoles, AssignRole, RevokeRole, ClaimScope, GetScope, CreateOrg, GetOrg, AddOrgMember, RemoveOrgMember, CreateTeam, AddTeamMember — each targeting the self-service publish route documented in brief.md (roles/visibility on /packages/..., NOT /admin/...).
      - RevokeRole and AssignRole are principal-typed (user|team|org + role) and RevokeRole throws carrying the server ErrorResponse message on 404 (no such role) and 409 (last owner).
      - Every wire DTO consumed by the new methods (PackageRoleResponse, PackageRolesListResponse, SetVisibilityRequest, SetVisibilityResponse, ScopeDetailResponse, ScopeChallengeBody, CreateOrgRequest, CreateOrgResponse, OrgDetailResponse, AddOrgMemberRequest, CreateTeamRequest, CreateTeamResponse, AddTeamMemberRequest, ClaimScopeRequest) is the shared type from Stash.Registry.Contracts and has a [JsonSerializable] entry in CliJsonContext — AssignRoleRequest and RevokeRoleRequest are already registered; the rest are added here. No CLI-local mirror DTO is authored.
      - dotnet publish for Stash.Cli completes with no new AOT trim warnings.
      - Fake-HttpMessageHandler unit tests confirm each new method targets the correct URL, HTTP verb, and request body shape (snake_case keys matching the shared Stash.Registry.Contracts types).
    notes: |
      This phase is ADDITIVE only — it does not delete the legacy AddOwner/
      RemoveOwner/GetOwners (those go in P3 with OwnerCommand). AssignRole/RevokeRole
      generalize the legacy helpers (principal-typed, self-service route) and will
      replace them once OwnerCommand is gone. All wire DTOs already live in
      Stash.Registry.Contracts (shipped 2026-06-03 via shared-registry-contracts,
      merge 953d799f) and are consumed directly — the CLI authors no DTO classes
      here. CliJsonContext already `using Stash.Registry.Contracts;` and already
      registers AssignRoleRequest + RevokeRoleRequest; P2 adds [JsonSerializable]
      entries for the still-unregistered shared types listed above.

  - id: P3
    title: stash pkg role command replaces stash pkg owner
    deps: [P1, P2]
    files:
      - Stash.Cli/PackageManager/Commands/RoleCommand.cs
      - Stash.Cli/PackageManager/Commands/PackageCommands.cs
      - Stash.Cli/PackageManager/Commands/OwnerCommand.cs
      - Stash.Cli/PackageManager/RegistryClient.cs
      - Stash.Tests/Cli/PackageRoleCommandTests.cs
    verify:
      - dotnet build Stash.Cli
      - dotnet test --filter "FullyQualifiedName~PackageRoleCommandTests"
    done_when:
      - OwnerCommand.cs is deleted; the "owner" verb is removed from PackageCommands dispatch and help text; and the legacy RegistryClient.AddOwner/RemoveOwner/GetOwners methods are removed with no remaining callers in the solution.
      - stash pkg role list/assign/revoke complete a full assign -> list -> revoke round-trip against a WebApplicationFactory<Program> registry (UseSolutionRelativeContentRoot("Stash.Registry")) using a PUBLISH-scoped token.
      - role assign rejects a missing/unknown principal-type or role with a non-zero exit code and a clear message; role revoke surfaces the server's 409 (last owner) and 404 (no such role) messages.
    notes: |
      Uniform publish ceiling: list (GET), assign (PUT), and revoke (DELETE) all run
      on /packages/{scope}/{name}/roles and require a publish token (NOT admin) — the
      integration test holds a publish token end to end. The /admin/... routes are
      override-only and are not used by this command. role revoke takes no role
      argument. Deleting OwnerCommand + the legacy helpers together (both here) keeps
      the build green at every phase boundary.

  - id: P4
    title: stash pkg visibility command (set only)
    deps: [P2]
    files:
      - Stash.Cli/PackageManager/Commands/VisibilityCommand.cs
      - Stash.Cli/PackageManager/Commands/PackageCommands.cs
      - Stash.Tests/Cli/PackageVisibilityCommandTests.cs
    verify:
      - dotnet build Stash.Cli
      - dotnet test --filter "FullyQualifiedName~PackageVisibilityCommandTests"
    done_when:
      - stash pkg visibility set <pkg> private flips the package's visibility on the registry (PATCH /packages/{scope}/{name}/visibility, publish token); after the flip, an unauthenticated GET /packages/{scope}/{name} is rejected by the visibility policy in the integration test.
      - visibility set rejects an unknown tier with a non-zero exit code and a clear message.
      - There is NO `visibility get` subverb (no server read path); the help text reflects set-only and points to the deferred backlog bug.
    notes: |
      `visibility get` is intentionally omitted — PackageDetailResponse has no
      visibility field and there is no GET .../visibility route. Tracked in
      .kanban/0-backlog/bugs/Package visibility has no read path (PackageDetailResponse omits visibility).md.

  - id: P5
    title: stash pkg scope command (claim + info)
    deps: [P2]
    files:
      - Stash.Cli/PackageManager/Commands/ScopeCommand.cs
      - Stash.Cli/PackageManager/Commands/PackageCommands.cs
      - Stash.Tests/Cli/PackageScopeCommandTests.cs
    verify:
      - dotnet build Stash.Cli
      - dotnet test --filter "FullyQualifiedName~PackageScopeCommandTests"
    done_when:
      - stash pkg scope claim <scope> creates the scope ownership row (POST /scopes with owner_type=user, owner=<authenticated user>; --org <org> sets owner_type=org); stash pkg scope info <scope> (GET /scopes/{scope}) reads it back showing the owner.
      - A second claim of the same scope by a different user fails with a non-zero exit code and a clear message.
      - Under Verified ownership policy, scope claim prints the DNS-TXT challenge (record_name/record_value/expires_at) instead of reporting a completed claim.
    notes: |
      ClaimScopeRequest carries scope/owner_type/owner (+ optional
      verification_method). Resolve owner from whoami for the user case. Confirm
      whether the server infers owner from the token when omitted; send it
      explicitly either way for determinism.

  - id: P6
    title: stash pkg org command (orgs + teams)
    deps: [P2]
    files:
      - Stash.Cli/PackageManager/Commands/OrgCommand.cs
      - Stash.Cli/PackageManager/Commands/PackageCommands.cs
      - Stash.Tests/Cli/PackageOrgCommandTests.cs
    verify:
      - dotnet build Stash.Cli
      - dotnet test --filter "FullyQualifiedName~PackageOrgCommandTests"
    done_when:
      - stash pkg org create <org> (POST /orgs, optional --display-name), org member add/remove, org team add, and org team member add each succeed against a WebApplicationFactory<Program> registry with a publish token.
      - stash pkg org info <org> (GET /orgs/{org}) prints the flat org metadata (id, name, display_name, created_at, created_by). It does NOT list members or teams (no server read path).
      - Each subverb rejects missing required arguments with a non-zero exit code and a clear message.
    notes: |
      org info shows flat metadata only — OrgDetailResponse carries no membership and
      there is no GET .../members route. Tracked in
      .kanban/0-backlog/bugs/Org members and teams have no read path (OrgDetailResponse omits them).md.
      Tests assert write success + arg validation, NOT member/team readback.

  - id: P7
    title: Docs, example, help-text cleanup
    deps: [P3, P4, P5, P6]
    files:
      - docs/PKG — Package Manager CLI.md
      - docs/Registry — Package Registry.md
      - Stash.Cli/PackageManager/Commands/PackageCommands.cs
      - examples/package_roles.stash
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~CompletionSurfaceSnapshotTests|FullyQualifiedName~CliPackageCommandsTests"
      - dotnet publish Stash.Cli -c Release -o /tmp/stash-cli-aot-p7
    done_when:
      - docs/PKG — Package Manager CLI.md documents the new role, visibility (set-only), scope, and org commands; the owner section is removed; and the visibility-get + org-membership deferrals are noted with pointers to the backlog bugs.
      - docs/Registry — Package Registry.md notes the self-service role routes the CLI uses (GET/PUT/DELETE /packages/{scope}/{name}/roles at the publish ceiling).
      - The stash pkg help text printed by PackageCommands no longer lists "owner" and lists "role", "visibility", "scope", and "org".
      - examples/package_roles.stash exists and demonstrates the new role grammar (assign, list, revoke) end to end.
    notes: |
      No `stash pkg` tab-completion subsystem exists — the surface lives only in
      PackageCommands.cs help text. If a CompletionSurfaceSnapshotTests baseline
      references pkg subcommands, rebaseline with
      STASH_SNAPSHOT_REGEN=1 dotnet test --filter FullyQualifiedName~CompletionSurfaceSnapshotTests.
      examples/package_roles.stash is pure .stash authoring — dispatch stash-author.

# Final acceptance — run by `/done` before promoting to 4-done/.
# Runs the FULL suite (no namespace-exclusion filter): the unfiltered dotnet test
# is green (see CLAUDE.md "final_verify runs the full suite — trust it"). The
# checklist-enforcement classes (CompletionSurfaceSnapshotTests, both
# ThrowsCoverageTests, StandardLibraryReferenceTests) run as part of it.
final_verify:
  - dotnet build
  - dotnet test
  - dotnet publish Stash.Cli -c Release -o /tmp/stash-cli-aot-final
  - stash scripts/checkpoint/validate-spec.stash pkg-cli-api-parity
