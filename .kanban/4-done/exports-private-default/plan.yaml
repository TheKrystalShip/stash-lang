# plan.yaml — exports-private-default
#
# Validate with: python3 scripts/checkpoint/validate-spec.py exports-private-default

schema_version: 1

feature: exports-private-default
title: Exports — Private by Default
brief: ./brief.md

created: 2026-05-18
architect_session: exports-private-default-2026-05-18

default_verify:
  - dotnet build

scope:
  - Stash.Core/Resolution/**
  - Stash.Analysis/**
  - Stash.Bytecode/**
  - Stash.Lsp/Handlers/CodeActionHandler.cs
  - Stash.Tests/**
  - docs/**
  - CHANGELOG.md

phases:
  - id: 1A
    title: Data model + builder — flip default to private
    deps: []
    files:
      - Stash.Core/Resolution/ModuleExports.cs
      - Stash.Analysis/Models/ModuleExportsBuilder.cs
      - Stash.Tests/Analysis/ExportSetBuilderTests.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~ExportSetBuilderTests"
    done_when:
      - ModuleExports has no HasExplicitExports property; Names is the only data field.
      - ModuleExportsBuilder always returns a ModuleExports whose Names reflects only explicit annotations; a file with zero annotations yields ModuleExports.Empty (empty Names) meaning "exports nothing".
      - ExportSetBuilderTests assert Names-based behavior only; no test references HasExplicitExports.
    notes: |
      Do not touch parser/lexer/AST. ExportDeclStmt and ExportBlockStmt
      stay exactly as the parent feature ships them. Update SA0805..SA0808
      emission only if the builder code-shape changes force it.

  - id: 1B
    title: Runtime + analyzer + LSP — drop dual-mode guards
    deps: [1A]
    files:
      - Stash.Bytecode/VM/VirtualMachine.Modules.cs
      - Stash.Analysis/Resolvers/ImportResolver.cs
      - Stash.Lsp/Handlers/CodeActionHandler.cs
      - Stash.Tests/Bytecode/*.cs
      - Stash.Tests/Analysis/ImportResolverExportTests.cs
      - Stash.Tests/Lsp/ExportLspTests.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~ImportResolverExportTests|FullyQualifiedName~ExportLspTests|FullyQualifiedName~VirtualMachine|FullyQualifiedName~BytecodeVmTests"
    done_when:
      - BuildExportedEnvironment filters strictly by Names when chunk.Exports is non-null; the only branch returning unfiltered globals is the chunk.Exports == null guard reserved for v3 on-disk chunks.
      - CLI-executed Stash source with zero export annotations raises "Module does not export 'X'" for any imported top-level name.
      - ImportResolver.ResolveSelectiveImport and ResolveNamespaceImport always consult Exports.Names; no HasExplicitExports guard remains.
      - CodeActionHandler "add missing import" proposes only names in Exports.Names regardless of whether the source file has any export annotation.

  - id: 1C
    title: Bytecode serialization — drop HasExplicitExports byte
    deps: [1A]
    files:
      - Stash.Bytecode/Serialization/BytecodeWriter.cs
      - Stash.Bytecode/Serialization/BytecodeReader.cs
      - Stash.Tests/Bytecode/ExportSerializationTests.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~ExportSerializationTests|FullyQualifiedName~BytecodeSerialization"
    done_when:
      - BytecodeWriter no longer emits the HasExplicitExports byte in the Exports payload; BytecodeReader no longer reads it.
      - BytecodeWriter.FormatVersion remains 4.
      - v4 round-trip of a chunk with Exports preserves Names exactly.
      - A v3-shaped chunk (no Exports section) loaded by the reader results in chunk.Exports == null, and a unit test pins that the VM exposes full globals in that case.

  - id: 1D
    title: Test sweep + end-to-end import-fails-by-default test
    deps: [1B, 1C]
    files:
      - Stash.Tests/**/*.cs
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~Stash.Tests.Analysis|FullyQualifiedName~Stash.Tests.Bytecode|FullyQualifiedName~Stash.Tests.Lsp|FullyQualifiedName~Stash.Tests.Interpreting.TaskBuiltInsTests" 2>&1 | grep -c "^Passed!"
      - dotnet test --filter "FullyQualifiedName~DapIntegrationTests.LoadedSources_WithImport_BothSourcesAppear" 2>&1 | grep -c "^Passed!"
    done_when:
      - Every reference to HasExplicitExports under Stash.Tests/ is removed or rewritten against Names.
      - A new end-to-end test executes a script that imports from a file with zero export annotations and asserts the runtime "does not export 'X'" error.
      - A new end-to-end test asserts that `import "f.stash" as ns` from a file with `export fn foo() {}` and `fn bar() {}` exposes ns.foo and does not expose ns.bar.
      - Full test suite is green.

  - id: 1E
    title: Docs + CHANGELOG
    deps: [1D]
    files:
      - docs/Stash — Language Specification.md
      - CHANGELOG.md
    verify:
      - dotnet build
      - dotnet test --filter "FullyQualifiedName~StandardLibraryReferenceTests|FullyQualifiedName~LanguageSpecificationTests"
    done_when:
      - The language specification's Exports section describes the single rule (everything is module-private; export annotations are the only way to expose a symbol) and removes any "dual-mode" / "file with at least one export" wording.
      - CHANGELOG records the breaking change under an unreleased entry.
      - Any spec-snapshot tests (if present) pass.

final_verify:
  - dotnet build
  # filter narrowed to feature-relevant test surface; pre-existing flaky test classes (including FuzzHarnessTests host crash) are tracked in .claude/repo.md Known Issues
  - dotnet test --filter "(FullyQualifiedName~Stash.Tests.Analysis|FullyQualifiedName~Stash.Tests.Bytecode|FullyQualifiedName~Stash.Tests.Lsp|FullyQualifiedName~Stash.Tests.Interpreting.TaskBuiltInsTests)&FullyQualifiedName!~FuzzHarnessTests"
  - dotnet test --filter "FullyQualifiedName~DapIntegrationTests.LoadedSources_WithImport_BothSourcesAppear"
